# Implementation Decisions Index (YAML Database)
#
# This YAML file serves as the central index/registry for all implementation decisions in the project.
# Each top-level key is a semantic token (e.g., IMPL-MODULE_VALIDATION).
#
# To append a new implementation decision:
# 1. Copy the template block at the bottom of this file (IMPL-IDENTIFIER)
# 2. Paste it at the end with a blank line before it
# 3. Replace IMPL-IDENTIFIER with your new token
# 4. Fill in all fields
# 5. Set detail_file to your new .yaml under implementation-decisions/ or null; methodology: agent-req-implementation-checklist.yaml
#
# Field descriptions:
#   name: Short descriptive name of the decision
#   status: Active | Deprecated | Template | Superseded
#   cross_references: List of ARCH-* and REQ-* tokens this decision implements
#   rationale: Structured explanation with why, problems_solved, benefits
#   implementation_approach: Structured approach with summary and details
#   code_locations: Structured code locations with files and functions
#   traceability: Structured links to architecture, requirements, tests, code_annotations
#   related_decisions: Lists of depends_on, supersedes, see_also (YAML lists or [])
#   detail_file: Path to the detailed .yaml in implementation-decisions/ or null for methodology index-only; procedure: tied/docs/agent-req-implementation-checklist.yaml
#   metadata: Optional metadata
# Methodology seed: token identity and traceability only; expand rationale in project detail files.
IMPL-TIED_FILES:
  name: TIED File Creation
  status: Active
  cross_references:
    - ARCH-TIED_STRUCTURE
    - REQ-TIED_SETUP
  detail_file: null
  traceability:
    architecture:
      - ARCH-TIED_STRUCTURE
    requirements:
      - REQ-TIED_SETUP
  related_decisions:
    depends_on: []
    supersedes: []
    see_also:
      - ARCH-TIED_STRUCTURE
      - REQ-TIED_SETUP
  metadata:
    last_updated:
      reason: 'Methodology seed; procedure: tied/docs/agent-req-implementation-checklist.yaml'
IMPL-MODULE_VALIDATION:
  name: Module Validation Implementation
  status: Active
  cross_references:
    - ARCH-MODULE_VALIDATION
    - REQ-MODULE_VALIDATION
  detail_file: null
  traceability:
    architecture:
      - ARCH-MODULE_VALIDATION
    requirements:
      - REQ-MODULE_VALIDATION
  related_decisions:
    depends_on: []
    supersedes: []
    see_also:
      - ARCH-MODULE_VALIDATION
      - REQ-MODULE_VALIDATION
  metadata:
    last_updated:
      reason: 'Methodology seed; procedure: tied/docs/agent-req-implementation-checklist.yaml'
IMPL-MCP_FEEDBACK_TOOLS:
  name: MCP Feedback Tools (tied_feedback_add, tied_feedback_export)
  status: Active
  cross_references:
    - ARCH-FEEDBACK_STORAGE
    - REQ-FEEDBACK_TO_TIED
  detail_file: null
  traceability:
    architecture:
      - ARCH-FEEDBACK_STORAGE
    requirements:
      - REQ-FEEDBACK_TO_TIED
  related_decisions:
    depends_on: []
    supersedes: []
    see_also:
      - ARCH-FEEDBACK_STORAGE
      - REQ-FEEDBACK_TO_TIED
  metadata:
    last_updated:
      reason: 'Methodology seed; procedure: tied/docs/agent-req-implementation-checklist.yaml'
