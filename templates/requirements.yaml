# Requirements Index (YAML Database)
#
# This YAML file serves as the central index/registry for all requirements in the project.
# Each top-level key is a semantic token (e.g., REQ-TIED_SETUP).
#
# To append a new requirement:
# 1. Copy the template block at the bottom of this file (REQ-IDENTIFIER)
# 2. Paste it at the end with a blank line before it
# 3. Replace REQ-IDENTIFIER with your new token
# 4. Fill in all fields
# 5. Set detail_file to your new .yaml under requirements/ or null for index-only; methodology uses agent-req-implementation-checklist.yaml
#
# Field descriptions:
#   name: Short descriptive name of the requirement
#   category: Functional | Non-Functional | Immutable
#   priority: P0 (Critical) | P1 (Important) | P2 (Nice-to-have) | P3 (Future)
#   status: "Implemented" | "Planned" | "Template"
#   rationale: Structured explanation with why, problems_solved, benefits
#   satisfaction_criteria: List of criterion items with optional metrics
#   validation_criteria: List of validation method items with coverage details
#   traceability: Structured links to architecture, implementation, tests, code_annotations
#   related_requirements: Lists of depends_on, related_to, supersedes (YAML lists or [])
#   detail_file: Path to the detailed .yaml in requirements/ or null for methodology index-only rows; procedure: tied/docs/agent-req-implementation-checklist.yaml
#   metadata: Optional metadata
# Methodology seed: token identity and traceability only; do not expand rationale here (use the checklist and project detail files when needed).
REQ-TIED_SETUP:
  name: TIED Methodology Setup
  category: Functional
  priority: P0
  status: Implemented
  detail_file: null
  traceability:
    architecture:
      - ARCH-TIED_STRUCTURE
    implementation:
      - IMPL-TIED_FILES
  related_requirements:
    depends_on: []
    related_to: []
    supersedes: []
  metadata:
    last_updated:
      reason: 'Methodology seed; procedure: tied/docs/agent-req-implementation-checklist.yaml'
REQ-MODULE_VALIDATION:
  name: Independent Module Validation Before Integration
  category: Functional
  priority: P0
  status: Implemented
  detail_file: null
  traceability:
    architecture:
      - ARCH-MODULE_VALIDATION
    implementation:
      - IMPL-MODULE_VALIDATION
  related_requirements:
    depends_on:
      - REQ-TIED_SETUP
    related_to: []
    supersedes: []
  metadata:
    last_updated:
      reason: 'Methodology seed; procedure: tied/docs/agent-req-implementation-checklist.yaml'
REQ-FEEDBACK_TO_TIED:
  name: Feedback to TIED (Feature Requests, Bug Reports, Methodology)
  category: Functional
  priority: P1
  status: Planned
  detail_file: null
  traceability:
    architecture:
      - ARCH-FEEDBACK_STORAGE
    implementation:
      - IMPL-MCP_FEEDBACK_TOOLS
  related_requirements:
    depends_on: []
    related_to:
      - REQ-TIED_SETUP
    supersedes: []
  metadata:
    last_updated:
      reason: 'Methodology seed; procedure: tied/docs/agent-req-implementation-checklist.yaml'
