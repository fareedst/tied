# Architecture Decisions Index (YAML Database)
#
# This YAML file serves as the central index/registry for all architecture decisions in the project.
# Each top-level key is a semantic token (e.g., ARCH-TIED_STRUCTURE).
#
# To append a new architecture decision:
# 1. Copy the template block at the bottom of this file (ARCH-IDENTIFIER)
# 2. Paste it at the end with a blank line before it
# 3. Replace ARCH-IDENTIFIER with your new token
# 4. Fill in all fields
# 5. Set detail_file to your new .yaml under architecture-decisions/ or null; methodology: agent-req-implementation-checklist.yaml
#
# Field descriptions:
#   name: Short descriptive name of the decision
#   status: Active | Deprecated | Template | Superseded
#   cross_references: List of REQ-* tokens this decision fulfills
#   rationale: Structured explanation with why, problems_solved, benefits
#   alternatives_considered: List of alternative items with pros, cons, rejected_reason
#   implementation_approach: Structured approach with summary and details
#   traceability: Structured links to requirements, implementation, tests, code_annotations
#   related_decisions: Lists of depends_on, informs, see_also (YAML lists or [])
#   detail_file: Path to the detailed .yaml in architecture-decisions/ or null for methodology index-only; procedure: tied/docs/agent-req-implementation-checklist.yaml
#   metadata: Optional metadata
# Methodology seed: token identity and traceability only; expand rationale in project detail files.
ARCH-TIED_STRUCTURE:
  name: TIED Project Structure
  status: Active
  cross_references:
    - REQ-TIED_SETUP
  detail_file: null
  traceability:
    requirements:
      - REQ-TIED_SETUP
    implementation:
      - IMPL-TIED_FILES
  related_decisions:
    depends_on:
      - REQ-TIED_SETUP
    informs:
      - IMPL-TIED_FILES
    see_also: []
  metadata:
    last_updated:
      reason: 'Methodology seed; procedure: tied/docs/agent-req-implementation-checklist.yaml'
ARCH-MODULE_VALIDATION:
  name: Module Validation Strategy
  status: Active
  cross_references:
    - REQ-MODULE_VALIDATION
  detail_file: null
  traceability:
    requirements:
      - REQ-MODULE_VALIDATION
    implementation:
      - IMPL-MODULE_VALIDATION
  related_decisions:
    depends_on:
      - REQ-MODULE_VALIDATION
    informs:
      - IMPL-MODULE_VALIDATION
    see_also: []
  metadata:
    last_updated:
      reason: 'Methodology seed; procedure: tied/docs/agent-req-implementation-checklist.yaml'
ARCH-FEEDBACK_STORAGE:
  name: Feedback Storage for TIED Reporting
  status: Active
  cross_references:
    - REQ-FEEDBACK_TO_TIED
  detail_file: null
  traceability:
    requirements:
      - REQ-FEEDBACK_TO_TIED
    implementation:
      - IMPL-MCP_FEEDBACK_TOOLS
  related_decisions:
    depends_on:
      - REQ-FEEDBACK_TO_TIED
    informs:
      - IMPL-MCP_FEEDBACK_TOOLS
    see_also: []
  metadata:
    last_updated:
      reason: 'Methodology seed; procedure: tied/docs/agent-req-implementation-checklist.yaml'
