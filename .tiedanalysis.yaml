roots: []
default_roots:
  - project_root
  - TIED_BASE_PATH
ignore_file: .tiedignore
follow_symlinks: false
token_scan:
  include_extensions:
    - .ts
    - .tsx
    - .js
    - .rb
    - .md
    - .yaml
    - .yml
    - .json
  max_file_bytes: 250000
  max_files: 5000
