        description: "Modules must be identified and documented before development; clear boundaries, interfaces, contracts, dependencies, validation criteria"
      - name: "Validation Approach"
        description: "Unit testing with mocks, integration testing with test doubles, contract validation, edge case testing, error handling validation"
      - name: "Integration Requirements"
        description: "Integration tasks separate from module development/validation; integration only after validation passes; integration tests validate combined behavior"
