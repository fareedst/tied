REQ-ATDD-COMPOS-EXPORT_TDD_PROMPTS_STEPS:
  name: Export TDD YAML steps to per-step markdown files
  category: Functional
  priority: P2
  status: Implemented
  rationale:
    why: Some workflows prefer file-per-step prompts instead of --tdd-yaml expansion; export must mirror TddLoopPrompts.step_entries_from_yaml
    problems_solved:
      - Need for reviewable .md artifacts per loop step
    benefits:
      - Repeatable prompt files under prompts/tdd/generated (when using export script)
    upstream_note: Imported from atdd commit eb88236290009b78eb11ea561816f0854176bf12; export script tools/agent-stream/export_tdd_prompts.rb
  satisfaction_criteria:
    - criterion: Each YAML step entry becomes one markdown file named from sanitized step id with message body from format_step
    - criterion: File count equals entry count from step_entries_from_yaml
