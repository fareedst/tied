REQ-TREEGREP_SESSION_SUMMARY_CONTENT_TEXT_MATCH:
  name: Session summary content for effective search settings
  category: Functional
  priority: P1
  status: Implemented
  description: After a successful search, callers can merge a structured Hash into run_summary (or equivalent) that reports the effective search root, active filename and content queries with activity flags and match_logic, optional filename_match_options and content_match_options when non-empty, optional exclusions (directory names, relative paths, relative path regex sources), optional time_bounds (after, before, field), optional path_filters (min_depth, max_depth, include_extensions, exclude_extensions, include_hidden, follow_symlinks), optional max_results, optional permission_behavior when not default fail_fast, optional git block when git_scope is set (scope, commit_ref, commit_range, include_deleted, include_renamed, history_content_source), optional output_options when sort_results, absolute_paths, or output_mode are passed, result_count always, and warning_count only when greater than zero. When permission_behavior is silent_skip ([REQ-TREEGREP_PERMISSION_SILENT_SKIP_TEXT_MATCH]), warning_count is omitted even if unreadable_skipped is non-empty or warning_count is supplied; otherwise warns derive from explicit warning_count or unreadable_skipped length. Unset optional sections are omitted. Performance timing in the summary is out of scope.
  boundary_conditions:
    - warning_count omitted when zero
    - permission_behavior silent_skip forces warning_count omitted (warns treated as zero)
