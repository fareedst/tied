  name: MCP Feedback Tools (tied_feedback_add, tied_feedback_export)
  status: Active
  cross_references:
    - ARCH-FEEDBACK_STORAGE
    - REQ-FEEDBACK_TO_TIED
  rationale:
    why: Implement REQ-FEEDBACK_TO_TIED and ARCH-FEEDBACK_STORAGE via two MCP tools and a testable feedback module
    problems_solved:
      - No programmatic way to add or export feedback from a TIED project
    benefits:
      - Projects can record and export feedback for the TIED project
      - Logic in pure/testable module; handlers stay thin
  implementation_approach:
    summary: Feedback module (load/append/export) under mcp-server/src/feedback.ts; two tool handlers in tools/index.ts
    details:
      - 'getFeedbackPath(basePath?): resolve {base}/feedback.yaml'
      - 'loadFeedback(basePath?): read YAML or return { entries: [] }; create file if missing on first append'
      - 'appendEntry(params): validate type/title/description; generate id (e.g. timestamp-based); set created_at; append to entries; write file'
      - 'exportMarkdown(entries), exportJson(entries): format all entries for report'
      - 'tied_feedback_add: parse args, call appendEntry, return ok/id/created_at and optional report_snippet (markdown)'
      - 'tied_feedback_export: load entries, call exportMarkdown or exportJson, return string'
  code_locations:
    files:
      - path: mcp-server/src/feedback.ts
        description: Feedback load/append/export logic [REQ-FEEDBACK_TO_TIED] [ARCH-FEEDBACK_STORAGE] [IMPL-MCP_FEEDBACK_TOOLS]
      - path: mcp-server/src/feedback.test.ts
        description: Unit tests for feedback module
      - path: mcp-server/src/tools/index.ts
        description: Tool handlers tied_feedback_add, tied_feedback_export
    functions:
      - name: loadFeedback
        file: mcp-server/src/feedback.ts
