REQ-TREEGREP_COUNT_ONLY_TEXT_MATCH:
  name: Count-only search output
  category: Functional
  priority: P1
  status: Implemented
  description: When count_only is true, plain-text output reports only how many files matched (matching-path count) and must not list paths or content lines. count_only false defers to listing formatters. Zero matches report count 0. Grouped counts by directory or extension are out of scope.
  rationale:
    why: Callers need totals without streaming every path or line.
    problems_solved:
      - Large result sets where only cardinality matters
    benefits:
      - Less I/O and smaller payloads for count-only UX
  boundary_conditions:
    - match_count 0 still produces valid count-only output
  out_of_scope:
    - Grouped counts by directory or extension
    - JSON/YAML count-only schema (separate output-mode REQs)
  satisfaction_criteria:
    - criterion: When count_only is true, output states the match count and contains no individual match paths or content lines
    - criterion: When count_only is true and three files match, output reflects 3
    - criterion: Zero matches yield count 0 in output
  example_acceptance:
    given: Three files match the query
    when: count_only is true
    then: Output reports 3 matches and no file paths or lines
  validation_criteria:
    - method: Automated test
      coverage: SearchRoot.count_matching_paths_after_validating_queries; SearchRun.format_text_search_output
  traceability:
    tests:
      - test_count_only_output_three_no_paths_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
      - test_count_only_zero_matches_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
      - test_count_matches_each_matching_enumeration_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
      - test_count_matching_paths_forwards_max_results_to_each_matching_after_validating_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
      - test_format_count_only_one_match_grammar_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
