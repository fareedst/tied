REQ-TREEGREP_GIT_TRACKED_SCOPE_TEXT_MATCH:
  name: Git tracked files search scope
  category: Functional
  priority: P1
  status: Implemented
  description: When git_scope is :tracked, only files that Git reports as tracked under the repository work tree (e.g. paths from git ls-files) are eligible as traversal match candidates. When the effective search root is not inside a Git working tree, the run fails with a clear not-a-git-repository style error. Nested repositories are not searched as separate Git projects (single work tree from rev-parse at the root). Extension, depth, hidden, time, exclude-dir, and permission behaviors still apply in composition after the tracked-files gate.
  boundary_conditions:
    - git_scope nil or :all applies no Git-based eligibility filter
    - Invalid git_scope values raise a typed validation error before traversal
  out_of_scope:
