    - criterion: Non-default filters appear under exclusions, time_bounds, path_filters, git, output_options as applicable
    - criterion: warning_count appears only when warnings > 0
    - criterion: silent_skip never emits warning_count in the summary map ([REQ-TREEGREP_PERMISSION_SILENT_SKIP_TEXT_MATCH])
  example_acceptance:
