REQ-TREEGREP_DEFAULT_SEARCH_ROOT:
  name: Default search root
  category: Functional
  priority: P1
  status: Implemented
  description: When no search root path is supplied or the path is empty, the effective search root is the process current working directory (absolute). The run summary must report that effective root. Shell alias and bare environment-variable expansion in paths are out of scope.
  rationale:
    why: Directory searches must have a predictable anchor and the user must see which tree was searched.
    problems_solved:
      - Ambiguous scope when root is omitted
      - Opaque summaries that omit the actual search base
    benefits:
      - Cwd-aligned default behavior
      - Transparent effective root in every run summary
  boundary_conditions:
    - Empty root path equals no root path
    - Whitespace-only root path is treated the same as no root path
  out_of_scope:
    - Resolving shell aliases in paths
    - Expanding environment-variable syntax in paths (e.g. $HOME)
  satisfaction_criteria:
    - criterion: If no root path is given, the effective search root is the process current working directory
    - criterion: An empty root path is treated the same as no root path
    - criterion: The run summary shows the effective search root
    - criterion: Files directly under the cwd are eligible (e.g. app.rb matches a file-name search for app when cwd contains app.rb)
  example_acceptance:
    given: The current working directory contains app.rb
    when: A file-name search for app is run with no root path
    then: app.rb is eligible to match and the summary shows the current working directory as the effective search root
  validation_criteria:
