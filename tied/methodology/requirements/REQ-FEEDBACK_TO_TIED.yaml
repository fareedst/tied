  status: Implemented
  description: Optional include_extensions list; each entry is normalized to a suffix with a leading dot (e.g. rb → .rb). A file is eligible only if File.basename(path) ends with one of the suffixes. nil or empty list (including after dropping blank entries) applies no extension filter.
