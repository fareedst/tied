IMPL-TREEGREP_DEFAULT_SEARCH_ROOT:
  name: Resolve default search root from cwd
  status: Active
  cross_references:
    - ARCH-TREEGREP_DEFAULT_SEARCH_ROOT
    - REQ-TREEGREP_DEFAULT_SEARCH_ROOT
    - IMPL-TREEGREP_EXPLICIT_SEARCH_ROOT
  rationale:
    why: Implements ARCH-TREEGREP_DEFAULT_SEARCH_ROOT and REQ-TREEGREP_DEFAULT_SEARCH_ROOT by resolving the directory tree anchor before traversal.
    problems_solved:
      - Walker invoked without a concrete root
    benefits:
      - Single function for default-root semantics
      - Summary can reuse the same resolved path
  implementation_approach:
    summary: 'Pure Ruby module Treegrep::SearchRoot: EFFECTIVE_SEARCH_ROOT calls validate_process_cwd! (nil or existing non-directory → InvalidSearchRootError; EXISTS && !IS_DIRECTORY via existing_non_directory_path?); empty_user_root? (TRIM_TO_EMPTY); default branch default_branch_effective_root (CANONICAL_DIRECTORY_PATH + ENOENT → InvalidSearchRootError); non-empty delegates resolve_explicit_search_root. ATTACH_SUMMARY_SEARCH_ROOT via DISPLAY_PATH.'
