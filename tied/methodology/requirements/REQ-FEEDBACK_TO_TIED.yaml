REQ-TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH:
  name: Git commit-based scopes exclude deleted paths by default
  category: Functional
  priority: P1
  status: Implemented
  description: When git_scope is :specific_commit or :commit_range, path eligibility is derived from git name-status (diff-tree for a single commit; git log --name-status for a range). When include_deleted is false (default), paths that git reports as deleted (D) are not eligible. Rename/copy source paths (R/C) are governed separately by include_renamed (default true; see REQ-TREEGREP_GIT_COMMIT_SCOPES_INCLUDE_RENAMED_DEFAULT_TEXT_MATCH). When include_deleted is true, deleted paths are included in the eligible set alongside added/modified/touched paths. include_deleted must be true, false, or nil when a commit-based scope is active; other values raise InvalidSearchRunOptionError. Other git_scope values ignore include_deleted without validating it. A path deleted and re-added under a different path is governed by the path strings git reports. Reporting deletion-only records as matches is out of scope.
  boundary_conditions:
    - include_deleted defaults to false (nil or false)
    - Invalid include_deleted is rejected only when using :specific_commit or :commit_range
  out_of_scope:
    - Emitting synthetic match rows for deletions without a filesystem path
    - Merge-commit first-parent vs combined diff policy
  satisfaction_criteria:
    - criterion: With :specific_commit and a commit that deletes a path, include_deleted false keeps that path out of the eligible set
    - criterion: With the same commit, include_deleted true puts the deleted path in the eligible set when it would otherwise be listed by git
    - criterion: :commit_range applies the same include_deleted semantics across the aggregated name-status output
  example_acceptance:
    given: commit abc123 deleted old.rb
    when: a search runs with git_scope :specific_commit, commit_ref abc123, and include_deleted false
    then: old.rb is not eligible
  validation_criteria:
    - method: Automated test
      coverage: search_run_test.rb; git_specific_commit_scope_test.rb; git_commit_range_scope_test.rb
  traceability:
    architecture:
      - ARCH-TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
    implementation:
      - IMPL-TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
    tests:
      - test_validate_include_deleted_nil_false_true_REQ_TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
      - test_validate_include_deleted_invalid_raises_REQ_TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
      - test_specific_commit_scope_deletion_commit_excludes_deleted_when_include_deleted_false_REQ_TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
      - test_specific_commit_scope_deletion_commit_includes_deleted_when_include_deleted_true_REQ_TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
      - test_commit_range_scope_excludes_deleted_in_range_when_include_deleted_false_REQ_TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
      - test_commit_range_scope_includes_deleted_in_range_when_include_deleted_true_REQ_TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
    code_annotations:
      - REQ-TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
      - ARCH-TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
      - IMPL-TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
