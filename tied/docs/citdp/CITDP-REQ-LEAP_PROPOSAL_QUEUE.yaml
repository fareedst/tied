risk_analysis:
  summary: |
    Risks center on mistaking non-canonical proposals for TIED truth, unbounded on-disk
    artifacts, git/session extraction edge cases, and operational confusion when MCP cwd
    differs from the intended project root. Design explicitly avoids writing project TIED YAML
    from queue tools, which mitigates the highest-severity class of accidental canonical corruption.
    Additional risks (RISK-009–RISK-012): monolithic implementation-decisions index vs detail-file
    drift, agents editing one repo's tied/ while MCP resolves another, YAML pretty-print changing
    block-scalar parsing, and merge/review load when many IMPL records change together.
  risks:
    - id: RISK-001
      description: |
        Users or agents treat proposal text as authoritative REQ/ARCH/IMPL without applying
        LEAP through yaml_index_* / detail writers and validation, causing drift or wrong edits.
      severity: High
      likelihood: Medium
      tied_token_references:
        - REQ-LEAP_PROPOSAL_QUEUE
        - ARCH-LEAP_PROPOSAL_QUEUE
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Document that proposals live under leap-proposals/ only; require explicit MCP YAML edits,
        lint_yaml, and tied_validate_consistency before marking applied. tied_leap_proposal_approve
        does not write tied/*.yaml. Workflow in docs/leap-proposal-queue.md lists apply-then-mark_applied.
    - id: RISK-002
      description: |
        queue.json or audit-log.jsonl grows without bound or is corrupted (partial write, disk full),
        breaking list/approve flows or losing audit history.
      severity: Medium
      likelihood: Low
      tied_token_references:
        - REQ-LEAP_PROPOSAL_QUEUE
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Operational: rotate or archive leap-proposals/ periodically in large repos; rely on JSON
        parse errors surfacing as tool errors. Future hardening could add size caps or rotation (out of scope).
    - id: RISK-003
      description: |
        Concurrent MCP clients or processes write queue.json simultaneously, leading to lost updates
        or inconsistent queue state.
      severity: Medium
      likelihood: Low
      tied_token_references:
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Single-writer expectation for the MCP server process; avoid parallel proposal writers against
        the same project root. Document serial use for automation.
    - id: RISK-004
      description: |
        extractDiffProposalCandidates fails or returns { error } (git unavailable, not a repo, diff errors);
        users assume proposals were created when none were.
      severity: Medium
      likelihood: Medium
      tied_token_references:
        - REQ-LEAP_PROPOSAL_QUEUE
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Tool returns structured result with error field; callers must check ok/error. Unit tests cover
        failure paths; IMPL pseudo-code documents non-throwing error return.
    - id: RISK-005
      description: |
        Session import or diff extraction produces low-quality or misleading line-level hints that
        pollute the queue and waste review time.
      severity: Low
      likelihood: Medium
      tied_token_references:
        - REQ-LEAP_PROPOSAL_QUEUE
        - ARCH-LEAP_PROPOSAL_QUEUE
      mitigation: |
        Reject workflow and manual update; explicit_opt_in required for extract/import; no auto-approval.
    - id: RISK-006
      description: |
        Project root resolves to an unexpected cwd (MCP server cwd), so leap-proposals/ is written
        beside the wrong tree or proposals are read from the wrong repo.
      severity: Medium
      likelihood: Medium
      tied_token_references:
        - ARCH-LEAP_PROPOSAL_QUEUE
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Document that paths are relative to configured project root / cwd; integrators pass explicit
        projectRoot where supported. Verify leap-proposals/ location before bulk operations.
    - id: RISK-007
      description: |
        safeLeapCall / JSON error envelope swallows sync fs or git exceptions into { ok: false, error },
        making root causes harder to see in logs than a thrown stack.
      severity: Low
      likelihood: Medium
      tied_token_references:
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Error strings propagate to clients; DEBUG/TRACE logging can be added at call sites if needed.
        Acceptable tradeoff for MCP JSON contract stability.
    - id: RISK-008
      description: |
        Users skip tied_leap_proposal_mark_applied after editing TIED YAML, leaving proposals "approved"
        but not linked to completed LEAP work, confusing queue hygiene.
      severity: Low
      likelihood: Medium
      tied_token_references:
        - REQ-LEAP_PROPOSAL_QUEUE
      mitigation: |
        Document final step in docs/leap-proposal-queue.md; list view shows status; periodic manual cleanup.
    - id: RISK-009
      description: |
        implementation-decisions.yaml (monolithic index) and implementation-decisions/IMPL-*.yaml
        detail files drift: essence_pseudocode updated in one place but not the other, so agents,
        validators, or humans read conflicting intent (e.g. after partial merges or copy/paste).
      severity: Medium
      likelihood: Medium
      tied_token_references:
        - REQ-TIED_SETUP
        - ARCH-TIED_STRUCTURE
        - IMPL-TIED_FILES
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        After edits, run persist-implementation-records-style sync (copy authoritative essence into index or vice versa per policy),
        then lint_yaml per file. Spot-check with a short script comparing parsed essence strings for tokens
        that must be identical; prefer one authoritative source and automate copy where feasible.
    - id: RISK-010
      description: |
        Coding agent applies yaml_index_* / yaml_detail_* MCP tools against the wrong TIED base path
        (e.g. workspace A while the checklist targets repo B), silently mutating unrelated project YAML
        or appearing to succeed while stdd tied/ is unchanged.
      severity: High
      likelihood: Medium
      tied_token_references:
        - REQ-TIED_SETUP
        - IMPL-TIED_FILES
      mitigation: |
        At session start call tied_config_get_base_path (or equivalent) and confirm it matches the repo
        under change; set TIED_BASE_PATH explicitly for CLI validation. When MCP cannot target the intended
        tree, document TIED_YAML_BYPASS and use direct edits only under the correct absolute paths, then
        lint_yaml those paths.
    - id: RISK-011
      description: |
        lint_yaml / yq -i -P canonicalization changes block chomping (e.g. |- vs |) or whitespace so the
        on-disk scalar parses differently (trailing newline, blank lines), breaking byte-for-byte parity
        checks between index and detail even when intent is unchanged.
      severity: Low
      likelihood: Medium
      tied_token_references:
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
        - IMPL-MCP_FEEDBACK_TOOLS
      mitigation: |
        Compare parsed YAML values (semantic equality) after lint, not raw text only; standardize on |
        where a trailing newline must match detail files; re-run comparison after every lint pass touching
        essence_pseudocode.
    - id: RISK-012
      description: |
        Broad edits across many IMPL-* records in one change increase merge conflicts, review fatigue,
        and the chance a block loses required REQ/ARCH/IMPL token comments or references wrong tokens.
      severity: Medium
      likelihood: Medium
      tied_token_references:
        - IMPL-GOAGENT-CLI-CMD
        - IMPL-GOAGENT-PIPELINE
        - IMPL-GOAGENT-EXECUTOR
        - IMPL-ATDD-E2E-AGENT_STREAM
      mitigation: |
        Prefer smaller, token-scoped commits; run tied_validate_consistency and pseudo-code validation
        (gate-pseudocode-validation) before persisting; use grep or MCP token scans to ensure bracket tokens resolve in
        semantic-tokens and indexes.
