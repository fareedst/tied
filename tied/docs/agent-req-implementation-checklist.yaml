    tasks:
      - Map the pseudo-code block/procedure to one test group (describe/it or test function). One block maps to approximately one test group.
      - Name the test group after the procedure and include the REQ token.
      - Carry the same REQ/ARCH/IMPL token comment as the pseudo-code block, stating what the test validates.
      - Assertions must match REQ/IMPL OUTPUT and behavior—never use deliberately wrong expected values (e.g. incorrect bytes) solely to force a failure; that invalidates “expected reason.”
      - 'Brownfield: if production already satisfies the contract, write the correct regression test per REQ/IMPL; first run may pass—document as baseline lock. Do not require synthetic failure.'
      - 'Honest failing RED (when needed): add a new measurable requirement not yet implemented, or use a test-side fixture that simulates failure without editing production (document how); do not falsify expected output.'
      - 'Allowed RED patterns (pick one and state it in the step output): Pattern A — tests-only: do not add or change files under production roots (e.g. src/, lib/, application packages) listed in IMPL code_locations; use test doubles, dynamic import, or harness-only helpers under tests/ or test/. Pattern B — minimal shim: if static imports require a production path, add only a minimal module at a path already declared in IMPL code_locations, exporting symbols the tests import with stub behavior (wrong values, throws, or not-implemented)—not real REQ satisfying behavior; full behavior belongs in unit-test-green.'
      - Write the test; run the suite. IF the test is intended to fail on a wrong implementation, confirm failure is due to implementation vs contract mismatch—not a buggy assertion. Do not add real REQ satisfying production implementation in this step (Pattern B shim-only when needed).
      - Verify the assertion corresponds to the OUTPUT or effect in the pseudo-code block.
      - IF no programmatic assertion can be written THEN mark testability e2e_only in IMPL detail with e2e_only_reason; skip to next block.
    outcomes: Test exists matching pseudo-code and REQ; honest RED or brownfield baseline documented; production source unchanged except Pattern B minimal shim when declared.
    references:
      - tied/processes.md § [PROC-IMPL_CODE_TEST_SYNC] Phases D-F
      - tied/docs/impl-code-test-linkage.md § Stage 2 — Unit TDD
    flow:
      next: unit-test-green
      branches: []
      calls: []
    tracking:
      status: pending
      consideration_before_proceeding: Test written and run; assertion matches pseudo-code OUTPUT/effect; failure reason honest (implementation gap, fixture, or brownfield baseline pass)—not wrong expected data.
      retry_count: 0
      returned_from:
