      - Run full test suite (unit, composition, E2E). All must pass.
      - Run lint for each language in scope.
      - 'CALL sub-pseudocode-validation-pass: re-run pseudo-code validation using tailoring profile agent_req_checklist_post_test in ./tied/docs/pseudocode-validation-checklist.yaml (docs/ copy at repo root when present)—close deferred_minimum_rules from agent_req_checklist_pre_red now that executable tests exist; document findings by category and severity. IF unresolved gaps THEN GOTO resolve-pseudocode or unit-test-red per findings.'
      - 'Run [PROC-TOKEN_VALIDATION]: run .cursor/skills/tied-yaml/scripts/tied-cli.sh tied_validate_consistency with JSON args per SKILL; fix any issues on ./tied/ via tied-cli.sh when possible.'
      - 'Final three-way alignment audit: for every IMPL touched, verify pseudo-code/test/code same token set; document e2e_only blocks and e2e_only_reason.'
      - Update IMPL detail metadata (traceability.tests, code_locations, metadata.last_updated) via tied-cli.sh yaml_detail_update on ./tied/implementation-decisions/IMPL-{TOKEN}.yaml; CALL sub-yaml-edit-loop on each changed absolute path.
      - 'Module validation per [REQ-MODULE_VALIDATION]: confirm each module validated independently; document results.'
    outcomes: All tests pass; lint clean; post-test pseudo-code validation pass recorded; token validation passes; three-way alignment verified; IMPL metadata current; module validation documented.
    references:
      - tied/processes.md § [PROC-IMPL_CODE_TEST_SYNC] Phase I
      - tied/processes.md § [PROC-CITDP] step 7
    flow:
      next: sync-tied-stack
      branches:
        - condition: Test failure
          action: Return to unit-test-red (unit) or composition-integration (composition) or end-to-end-ui (E2E)
          target: unit-test-red
        - condition: Lint failure
          action: Fix code, re-run lint
          target: null
        - condition: Token validation failure
          action: Register missing tokens, fix traceability gaps
          target: null
        - condition: Three-way alignment failure
          action: Apply LEAP order (pseudo-code first, then test, then code)
          target: null
        - condition: Post-test pseudo-code validation reports unresolved gaps vs minimum_gating_rules
          action: GOTO resolve-pseudocode or unit-test-red per findings
          target: resolve-pseudocode
      calls:
        - sub-pseudocode-validation-pass
        - sub-yaml-edit-loop
    tracking:
      status: pending
      consideration_before_proceeding: Full suite and lint pass; post-test sub-pseudocode-validation-pass complete; token validation ok; three-way audit done; IMPL metadata updated; module validation documented.
      retry_count: 0
      returned_from: []
      state_history: []
  # slug sync-tied-stack time
  - slug: sync-tied-stack
    agentstream_new_session: true
    title: TIED docs match implementation; consistency via tied-cli.sh
    goals: Ensure TIED documentation matches the final implementation. TIED docs remain single source of truth for intent.
    preconditions:
      - verification-gate satisfied for this pass, or partial sync explicitly scoped (document divergence).
      - tied-cli.sh available for mutations under ./tied/.
    tasks:
      - Update REQ/ARCH/IMPL index and detail files under ./tied/ via tied-cli.sh so final code/tests match TIED; IMPLs reflect implemented code and block-level token comments.
      - Sync ./tied/semantic-tokens.yaml, requirements.yaml, architecture-decisions.yaml, implementation-decisions.yaml and detail dirs; no documentation drift; do not patch those YAML paths with IDE tools when tied-cli.sh covers the mutation.
      - CALL sub-yaml-edit-loop on every changed TIED YAML file.
      - Run .cursor/skills/tied-yaml/scripts/tied-cli.sh tied_validate_consistency '{}' — must report ok true.
      - If REQ/ARCH/IMPL status, traceability.tests, or other TIED fields changed in this pass such that they would desync a session preload (status lines, test file paths, implementation_contract hints), re-check workspace-root agent-preload-contract.yaml and update only as needed; do not duplicate the full author-architecture or persist-implementation-records rewrite if nothing material changed.
    outcomes: TIED docs consistent with implementation; tied_validate_consistency passes; optional agent-preload-contract.yaml recheck if TIED status or traceability to tests/code shifted.
    references:
      - tied/processes.md § [PROC-TIED_DEV_CYCLE] steps 8-9
      - tied/processes.md § [PROC-LEAP]
      - ./docs/agent-preload-contract-template.yaml
    flow:
      next: user-facing-release-notes
      branches:
        - condition: Divergence between TIED docs and code/tests detected
          action: 'Apply LEAP: update IMPL (GOTO resolve-pseudocode scope); if scope changed update ARCH (GOTO author-architecture), REQ (GOTO author-requirement); then return here and re-run consistency validation'
          target: resolve-pseudocode
      calls:
        - sub-yaml-edit-loop
    tracking:
      status: pending
      consideration_before_proceeding: TIED docs match code/tests; tied_validate_consistency reports ok true; agent-preload-contract.yaml re-checked or explicitly unchanged if sync did not affect preload-relevant fields.
      retry_count: 0
      returned_from: []
      state_history: []
  # slug user-facing-release-notes time
  - slug: user-facing-release-notes
    title: README and CHANGELOG
    goals: Record user-facing and release-facing changes made in this session.
    preconditions:
      - Update README.md / CHANGELOG.md only when the repo already tracks them, project policy requires them, or the change-definition / FEATURE_GOAL explicitly asks for user-facing docs—do not create them solely because they are missing unless policy says otherwise.
    tasks:
      - IF preconditions met, update README.md for user-facing changes (new features, changed behavior, setup instructions).
      - IF preconditions met, update CHANGELOG.md for release-facing changes (features, fixes, breaking changes).
      - IF no user-facing doc obligation applies, skip with one-line note—do not add README/CHANGELOG just to satisfy the step.
    outcomes: External documentation reflects the session's changes when applicable.
    references:
      - tied/processes.md § [PROC-TIED_DEV_CYCLE] step 9
    flow:
      next: persist-citdp-record
      branches: []
      calls: []
    tracking:
      status: pending
      consideration_before_proceeding: README/CHANGELOG updated when policy or goal requires; otherwise explicitly skipped.
      retry_count: 0
      returned_from: []
      state_history: []
  # slug persist-citdp-record time
  - slug: persist-citdp-record
    title: CITDP YAML under client docs/citdp
    goals: Store the change-analysis record for future reference.
    preconditions:
      - ./tied/citdp/ creatable at client workspace root (or path per project policy). When ./tied/docs/citdp-policy.md says skip, record skip instead of writing a file.
    tasks:
      - 'Populate CITDP YAML record: start from ./tied/docs/citdp-record-template.yaml (copy methodology layout); fill record identity; change definition (from change-definition); impact analysis (from impact-discovery); risk analysis (from risk-assessment); test strategy (from test-strategy); TDD sequence (from unit-test-red through end-to-end-ui); completion criteria (from verification-gate); LEAP feedback (divergences_from_analysis, tied_stack_updates_required, record_status).'
      - Store as tied/citdp/CITDP-{change_request_id}.yaml. Must be the client project root—same repository as the project tied/ tree for this implementation. Do not persist CITDP only under a separate checkout of the TIED methodology repository when the client is another project; optional mirrors elsewhere are policy-specific and do not replace this path. Project-defined absolute path outside tied/ only when policy explicitly requires.
      - Validate with lint_yaml on that absolute CITDP path (per [PROC-YAML_EDIT_LOOP] in processes.md; raw multi-argument `yq` merges documents—do not use that). CITDP files are outside the standard TIED index/detail paths unless project policy adds tooling for them.
      - CALL sub-yaml-edit-loop on the record file.
    outcomes: CITDP record stored and validated; analysis available for future reference.
    references:
      - tied/processes.md § [PROC-CITDP] step 8
      - tied/processes.md § [PROC-YAML_DB_OPERATIONS]
      - tied/docs/citdp-policy.md
    flow:
      next: traceable-commit
      branches:
        - condition: YAML validation fails
          action: Fix and repeat sub-yaml-edit-loop step
          target: null
      calls:
        - sub-yaml-edit-loop
    tracking:
      status: pending
      consideration_before_proceeding: 'CITDP record written and sub-yaml-edit-loop passed. Policy for when to create vs skip: ./tied/docs/citdp-policy.md.'
      retry_count: 0
      returned_from: []
      state_history: []
  # slug traceable-commit time
  - slug: traceable-commit
    title: Commit per PROC-COMMIT_MESSAGES; no push unless asked
    goals: Create a traceable commit with proper format and token references.
    preconditions:
      - Git repository at workspace root (.git present); working tree changes staged per project norms. If not a git repo, skip with explicit note—do not initialize git unless policy asks.
    tasks:
      - 'Write commit message per [PROC-COMMIT_MESSAGES]: header <type>(<scope>): <subject> (≤50 chars); type feat|fix|docs|refactor|test|build|ci|chore|perf|style; scope area affected; subject imperative present tense; body motivation/behavior; footer Closes/Fixes #issue and REQ/ARCH/IMPL tokens touched.'
      - Stage relevant files. Commit.
      - Do NOT push unless explicitly asked.
      - IF the driver emits additional turns for sub-yaml-edit-loop, sub-pseudocode-validation-pass, or sub-leap-micro-cycle after this step, those subs were already invoked via CALL during earlier steps—unless you have new mutations, reply with one-line RETURN; do not repeat full procedures.
    outcomes: 'Commit exists with proper format; TIED tokens referenced in body or footer. EXIT: Checklist complete. Do not create a stand-alone summary document.'
    references:
      - tied/processes.md § [PROC-COMMIT_MESSAGES]
    flow:
      next: EXIT
      branches: []
      calls: []
    tracking:
      status: pending
      consideration_before_proceeding: Commit created; format per PROC-COMMIT_MESSAGES; tokens in body/footer.
      retry_count: 0
      returned_from: []
      state_history: []
sub_procedures:
  # slug sub-yaml-edit-loop time
  - slug: sub-yaml-edit-loop
    title: tied-cli.sh mutations, lint_yaml, tied_validate_consistency
    preconditions:
      - Caller provides absolute or repo-relative paths for changed YAML files.
      - When mutating ./tied/ project-owned YAML, .cursor/skills/tied-yaml/scripts/tied-cli.sh and SKILL.md contract available; if tied-cli missing, RETURN error to caller—no silent IDE patch of TIED paths.
    invoked_by:
      - author-requirement
      - author-architecture
      - persist-implementation-records
      - three-way-alignment-unit
      - composition-integration
      - verification-gate
      - sync-tied-stack
      - persist-citdp-record
      - sub-leap-micro-cycle
    goals: Ensure every TIED YAML file is syntactically valid, skill-routed where applicable, and consistent before use. Use lint_yaml per [PROC-YAML_EDIT_LOOP] (processes.md); it accepts one or more paths and must process each file independently. Never use raw multi-argument `yq` pretty-print on multiple paths in one process.
    tasks:
      - 'Mutation path: for create/update/delete under ./tied/ on project-owned YAML (indexes, requirements/*.yaml, architecture-decisions/*.yaml, implementation-decisions/*.yaml, semantic-tokens.yaml, feedback.yaml), use .cursor/skills/tied-yaml/scripts/tied-cli.sh per .cursor/skills/tied-yaml/SKILL.md. Do not use apply_patch/Write on those absolute paths when tied-cli.sh covers the operation.'
      - 'After yaml_detail_update or yaml_index_update: re-read affected detail/index rows; mcp-server deep-merges one level for metadata/traceability/related_* objects, but arrays (e.g. cross_references) still replace wholesale—if metadata.created or similar is missing (older server or mistaken payload), restore with one follow-up yaml_*_update—see docs/yaml-update-mcp-runbook.md §2.1.'
      - Never mutate ./tied/methodology/** (read-only). If a tool rejects a write as methodology-owned, fix the target token/path—do not bypass with direct file edit.
      - 'IF tied-cli.sh returns an error: interpret payload, TIED_BASE_PATH, methodology vs project and retry; do not silently fall back to IDE file tools on the same paths.'
      - 'Direct-edit exception only when no tied-cli.sh tool covers the operation: document one-line gap, edit minimal file, then run lint_yaml <absolute-path> until it passes (or one lint_yaml with multiple paths if your wrapper implements per-file safe passes per processes.md).'
      - Run lint_yaml on each changed file that was direct-edited or when your workflow requires canonical formatting on disk—never raw multi-argument `yq` with multiple file arguments in one process. If validation fails, fix and repeat; file is invalid until lint_yaml succeeds.
      - Run .cursor/skills/tied-yaml/scripts/tied-cli.sh tied_validate_consistency '{}' (required before marking TIED work complete; not optional when sub-yaml-edit-loop is invoked for TIED changes).
      - IF consistency check fails THEN fix the TIED stack via tied-cli.sh (prefer yaml_detail_update / yaml_index_update) and RETURN to the calling step to re-validate.
    outcomes: YAML valid and consistent; mutations used tied-cli.sh where required; no silent bypass of tied-yaml.
    references:
      - .cursor/skills/tied-yaml/SKILL.md
      - .cursor/skills/tied-yaml/reference.md
      - ./tied/processes.md § [PROC-YAML_EDIT_LOOP]
      - ./tied/docs/methodology-diagrams.md Diagram 6
    flow:
      return_to: caller
    tracking:
      status: pending
      consideration_before_proceeding: tied-cli.sh mutation path honored where applicable; lint_yaml passed for any direct-edited files (per processes.md [PROC-YAML_EDIT_LOOP]); tied_validate_consistency passed when TIED files changed.
      retry_count: 0
      state_history: []
  # slug sub-pseudocode-validation-pass time
  - slug: sub-pseudocode-validation-pass
    title: Checklist-ordered passes until gating satisfied
    preconditions:
      - IMPL pseudo-code set identified (from gate-pseudocode-validation or verification-gate caller).
      - Validation checklist loadable from ./tied/docs/pseudocode-validation-checklist.yaml or ./docs/pseudocode-validation-checklist.yaml (or manual checklist walk documented).
    invoked_by:
      - gate-pseudocode-validation
      - verification-gate
    goals: Ensure IMPL pseudo-code satisfies the application pseudo-code validation checklist before persisting or writing tests/code. Required checks are gating unless waived and documented.
    tasks:
      - Load the checklist from tied/docs/pseudocode-validation-checklist.yaml (or docs/pseudocode-validation-checklist.yaml at repo root).
      - Apply tailoring profile agent_req_checklist_pre_red when invoked from gate-pseudocode-validation before tests exist—defer minimum_gating_rules items that assume executable tests already exist (see checklist tailoring.profiles).
      - Apply tailoring profile agent_req_checklist_post_test when invoked from verification-gate—do not defer deferred_minimum_rules from agent_req_checklist_pre_red; evaluate behavioral/traceability rows that require executable tests now that tests exist (or mark N/A with rationale).
      - For each pseudo-code block in the IMPL set (from IMPL phase (stubs catalog-pseudocode-contracts … persist-implementation-records)), run each validation category in the checklist's recommended_validation_order; collect findings with severity and block/location.
      - IF any required check fails OR minimum gating rules for the active profile are not met THEN fix pseudo-code (or ARCH/REQ if scope changed), then repeat from step 2. RETURN only when gating rules pass or documented deferral per profile.
      - RETURN to caller (gate-pseudocode-validation continues to persist-implementation-records; verification-gate continues after post-test pass).
    outcomes: Pseudo-code validation report (findings by category, severity, location); structural checks pass; test-dependent rules deferred per agent_req_checklist_pre_red when applicable only for pre-RED invocations; post-test invocations close pre-RED deferrals per agent_req_checklist_post_test.
    references:
      - tied/docs/pseudocode-writing-and-validation.md
      - tied/docs/pseudocode-validation-checklist.yaml
      - tied/processes.md § [PROC-PSEUDOCODE_VALIDATION]
    flow:
      return_to: gate-pseudocode-validation
    tracking:
      status: pending
      consideration_before_proceeding: Gating rules pass or waiver documented; RETURN to gate-pseudocode-validation.
      retry_count: 0
      state_history: []
  # slug sub-leap-micro-cycle time
  - slug: sub-leap-micro-cycle
    title: Fix IMPL first during GREEN; revisit REQ/ARCH if scope shifts
    preconditions:
      - IMPL detail file ./tied/implementation-decisions/IMPL-{TOKEN}.yaml exists for affected IMPL; tied-cli yaml_detail_read/update available.
      - Invoked from unit-test-green when GREEN exposed pseudo-code drift—do not enter if no IMPL path to update.
    invoked_by:
      - unit-test-green
    goals: Keep pseudo-code authoritative at every point during TDD. Prevent silent divergence.
    tasks:
      - STOP writing production code immediately.
      - 'Update IMPL essence_pseudocode via tied-cli.sh: prefer impl_detail_set_essence_pseudocode when only essence_pseudocode (and optional metadata.last_updated) changes; otherwise yaml_detail_read then yaml_detail_update on ./tied/implementation-decisions/IMPL-{TOKEN}.yaml (no direct patch when tied-cli.sh works).'
      - CALL sub-yaml-edit-loop on the changed detail file (absolute path under ./tied/).
      - Update or add the test to match the corrected pseudo-code. Carry the same token comments.
      - Update the production code to pass the corrected test. Carry the same token comments.
      - Verify three-way alignment for the affected block (per three-way-alignment-unit rules).
      - 'IF the change affects ARCH scope THEN update ARCH via tied-cli.sh: GOTO author-architecture (scoped to affected ARCH), CALL sub-yaml-edit-loop, then return here.'
      - 'IF the change affects REQ scope THEN update REQ via tied-cli.sh: GOTO author-requirement (scoped to affected REQ), CALL sub-yaml-edit-loop, then return here.'
    outcomes: Pseudo-code remained authoritative. No silent divergence. Three-way alignment holds for the affected block.
    references:
      - tied/docs/impl-code-test-linkage.md § 3 — LEAP Micro-Cycle During TDD
      - tied/processes.md § [PROC-LEAP] rule 1
    flow:
      return_to: unit-test-green
      branches:
        - condition: Change affects ARCH scope
          action: GOTO author-architecture, CALL sub-yaml-edit-loop, then return to unit-test-green
          target: author-architecture
        - condition: Change affects REQ scope
          action: GOTO author-requirement, CALL sub-yaml-edit-loop, then return to unit-test-green
          target: author-requirement
    tracking:
      status: pending
      consideration_before_proceeding: IMPL/test/code updated; three-way alignment verified; ARCH/REQ updated if scope changed; RETURN to unit-test-green.
      retry_count: 0
      state_history: []
