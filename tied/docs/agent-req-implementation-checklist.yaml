# Agent Requirement Implementation Checklist (executable YAML)
#
# HIGHEST PRIORITY: This file MUST be copied to a unique file for each request in a working folder.
# Keep all such copies in that working folder. Do not track completion or run the checklist against
# the canonical file in docs/; use the per-request copy. File name MUST include (1) the REQ semantic
# token for the requirement (e.g. REQ-DATA_SAVE) and (2) a sortable timestamp value (e.g. ISO8601
# compact YYYYMMDDHHMMSS or seconds since epoch). Example: <working_folder>/REQ-DATA_SAVE_20260316120000.yaml
# or <working_folder>/REQ-DATA_SAVE_1710619200.yaml. Create the working folder if it does not exist.
#
# Source: docs/agent-req-implementation-checklist.md
# Process token: [PROC-AGENT_REQ_CHECKLIST]
# Each step is atomic (repeatable/skippable). Tracking supports completion gates and retry state.
#
# Optional per-step key: preconditions (list of strings). Semantics:
#   - When ALL preconditions hold, the step's primary gated work is mandatory per tasks and session-bootstrap sequence.
#   - When a named path, tool, or prior artifact is missing (early/immature client), do not fake completion: defer
#     (finish prerequisite steps first), perform a lightweight pass on what exists, or skip with an explicit note
#     in the per-request checklist copy—aligned with atomic/skippable steps.
#
# Suggested session handoffs (non-normative; full table in source_document at repo root docs/):
#   Optional new-session boundaries when the repo and per-request checklist copy already hold enough state
#   to re-bootstrap with a small prompt. Strongest pre-code: persist-implementation-records, then
#   risk-assessment / test-strategy; TDD: three-way-alignment-unit iterations or advance to
#   composition-integration; after end-to-end-ui, verification-gate, persist-citdp-record; then traceable-commit.
#   Does not change step order, gating, or loop_back_clearance. Avoid mid sub-leap-micro-cycle.
# agentstream_new_session (optional bool on a step or sub): when true, Go/Ruby --lead-checklist-yaml
#   drivers issue that turn without --resume (new Cursor session). Omitted or false: chain to prior turn.
#
# Step completion comments (above each item in steps and sub_procedures):
#   Not completed:  # slug <STEP_SLUG> time   (space after "time" is where seconds-in-epoch will be written)
#   Completed:      # slug <STEP_SLUG> time <seconds-in-epoch>
#
# Record completion time (slug=step slug, val=seconds since epoch, file=this YAML path):
#   BSD/macOS:  sed -i '' "s/^  # slug $slug time$/& $val/" "$file"
#   POSIX:      sed "s/^  # slug $slug time$/& $val/" "$file" > "$file.tmp" && mv "$file.tmp" "$file"
#
# Clear completion for loop-back: use loop_back_clearance.<target>.clear_slugs; reset each listed slug
# so the comment is "  # slug <slug> time" (no epoch). Commands (slug=step slug, file=this YAML path):
#   BSD/macOS:  sed -i '' "s/^  # slug $slug time [0-9][0-9]*$/  # slug $slug time/" "$file"
#   POSIX:      sed "s/^  # slug $slug time [0-9][0-9]*$/  # slug $slug time/" "$file" > "$file.tmp" && mv "$file.tmp" "$file"
# Example: clear completion markers for loop-back target author-requirement — use canonical step slugs (they match `# slug <slug> time` lines); loop over clear_slugs under that stub key in loop_back_clearance:
#   for slug in catalog-pseudocode-contracts flag-insufficient-specs … traceable-commit; do
#     sed -i '' "s/^  # slug $slug time [0-9][0-9]*$/  # slug $slug time/" "$file"   # BSD/macOS
#   done
name: agent_req_implementation_checklist
description: |
  Primary procedural template for every new requirement or change to the tested system. Unifies CITDP, TIED dev cycle, IMPL_CODE_TEST_SYNC, LEAP, YAML edit loop, and related processes. Mandatory order: IMPL pseudo-code (token-commented) -> RED tests -> code.
  Driver note (agentstream): When sub_procedures are appended as extra turns after traceable-commit, each was usually already executed via CALL during an earlier step. Unless new TIED/YAML mutations are pending, respond with a one-line RETURN (no full re-validation). Prefer --lead-checklist-skip-sub when generating turns to avoid duplicate subs (see tools/agentstream README).
  Non-normative: Optional new-session handoffs (when disk + per-request copy justify a fresh context) are documented in source_document under "Suggested session handoffs"; see YAML header comment for slug summary. [PROC-CITDP] final CITDP file is persist-citdp-record after implementation; pre-TDD analysis ends at test-strategy after TIED/IMPL on disk.
  Main steps that start a handoff set agentstream_new_session: true for tools/agentstream and tools/agent-stream (per source_document at repo root docs/); other clients may ignore.
source_document: docs/agent-req-implementation-checklist.md
process_token: '[PROC-AGENT_REQ_CHECKLIST]'
version: 1.5.2
last_updated: "2026-04-22"
# Paths below are repo-relative from the workspace root where this checklist runs.
workspace_paths:
  # WORKSPACE_ROOT: set when copies live outside the default checkout
  TIED_BASE: ./tied
  TIED_DOCS: ./tied/docs
  CITDP_RECORDS: ./tied/citdp
processes_unified:
  - '[PROC-CITDP]'
  - '[PROC-TIED_DEV_CYCLE]'
  - '[PROC-IMPL_CODE_TEST_SYNC]'
  - '[PROC-LEAP]'
  - '[PROC-YAML_EDIT_LOOP]'
  - '[PROC-IMPL_PSEUDOCODE_TOKENS]'
  - '[PROC-PSEUDOCODE_VALIDATION]'
  - '[PROC-TOKEN_AUDIT]'
  - '[PROC-TOKEN_VALIDATION]'
  - '[PROC-TEST_STRATEGY]'
  - '[PROC-COMMIT_MESSAGES]'
entry_points:
  - scenario: New requirement
    start_at: session-bootstrap
    notes: Full checklist applies
  - scenario: Change to existing system
    start_at: session-bootstrap
    notes: CITDP analysis applies at change-definition … impact-discovery; existing tokens loaded at impact-discovery
  - scenario: TIED prepared; tests/code not updated
    start_at: session-bootstrap
    notes: author-requirement … persist-implementation-records verify-only; use updated REQ/ARCH/IMPL as source of truth; follow [PROC-TIED_FIRST_IMPLEMENTATION]
  - scenario: Bug fix
    start_at: session-bootstrap
    notes: At change-definition, determine if a REQ is missing; if so, create REQ at author-requirement before defining the fix
flow_control_notation:
  - symbol: GOTO <stub>
    meaning: Jump to the step identified by its YAML slug (stub name); resume from there (same slug in completion markers).
  - symbol: IF condition THEN action
    meaning: Conditional branch
  - symbol: LOOP ... UNTIL condition
    meaning: Repeat enclosed steps until condition is met
  - symbol: CALL <sub-stub>
    meaning: Invoke sub-procedure by its YAML slug; return to the calling step when done
  - symbol: RETURN
    meaning: Return from a sub-procedure to the caller
  - symbol: EXIT
    meaning: Checklist complete
# Loop-backs: for each GOTO target, clear these step slugs so all steps are available for the new pass.
# When re-entering a step, reset completion comments (# slug STEP time) for every slug listed under that target.
