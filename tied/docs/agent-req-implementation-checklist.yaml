steps:
  # slug session-bootstrap time
  - slug: session-bootstrap
    title: Governed TIED context and skill-routed YAML path
    goals: Confirm access to all governing TIED documents; understand current project state and priorities.
    preconditions:
      - Active workspace root is the implementation repository for this requirement or change.
      - When ./tied/ or .cursor/skills/tied-yaml/ are missing (immature client), run only tasks that apply to existing paths; defer tied-cli TIED mutations until the methodology bundle is installed—record what was deferred in the per-request checklist copy.
    tasks:
      - Preface the response with "Observing AI principles!".
      - 'Read completely: ai-principles.md'
      - 'Review token registry: ./tied/semantic-tokens.yaml and guide: ./tied/semantic-tokens.md'
      - 'Review YAML indexes: ./tied/architecture-decisions.yaml and ./tied/implementation-decisions.yaml'
      - 'Review IMPL schema and pseudo-code rules: ./tied/implementation-decisions.md ([PROC-IMPL_PSEUDOCODE_TOKENS]).'
      - Read .cursor/skills/tied-yaml/SKILL.md. For every create/update/delete under project TIED YAML (./tied/*.yaml and detail trees under ./tied/requirements, ./tied/architecture-decisions, ./tied/implementation-decisions, excluding methodology), invoke tools only through .cursor/skills/tied-yaml/scripts/tied-cli.sh with tool name and JSON arguments per the skill and .cursor/skills/tied-yaml/reference.md. Set TIED_BASE_PATH and the built dist/index.js path per the skill Environment overrides. When .cursor/skills/tied-yaml/ or tied-cli.sh is missing, follow this step's preconditions (defer, lightweight pass, or explicit note in the per-request checklist copy)—do not leave the checklist to obtain tooling. In agentstream or headless runs, rely on tied-cli.sh only. Do not use apply_patch or Write on those paths when tied-cli.sh covers the operation; on errors retry with corrected JSON; do not silently fall back to direct file edit.
      - 'Mandatory global sequence (before any RED test or production code): token-commented IMPL essence_pseudocode → gate-pseudocode-validation → persist-implementation-records when authoring new IMPL — then RED tests → GREEN code.'
      - 'Within TDD after pseudo-code is authoritative: failing test before production code. When weighing non-implementation trade-offs: Tests > Basic Functions > Developer Experience > Infrastructure > Security — never start RED or production code before IMPL pseudo-code is complete per the mandatory sequence above.'
      - 'Implementation freeze until gate-pseudocode-validation and persist-implementation-records are satisfied for this REQ/changed IMPL set: do not add or modify production implementation files (application source, deliverable scripts, etc.) or automated test files. Exception only for TIED YAML and docs required by completed checklist steps (TIED paths routed per .cursor/skills/tied-yaml/SKILL.md).'
      - Do not paste or author deliverable production scripts or automated test files in this bootstrap step; session-bootstrap is read-only orientation (governing docs and skill contract), not implementation.
    outcomes: Agent has read all governing documents. Session context is established.
    references:
      - AGENTS.md § 1-2
      - ai-principles.md § Mandatory Acknowledgment, § Checklist for AI Agents
      - .cursor/skills/tied-yaml/SKILL.md
      - .cursor/skills/tied-yaml/reference.md
    flow:
      next: translate-sponsor-intent
      branches: []
      calls: []
    tracking:
      status: pending
      consideration_before_proceeding: All governing documents read; session context established; mandatory IMPL→validation→persist→RED→GREEN sequence and implementation freeze understood.
      retry_count: 0
      returned_from: []
      state_history: []
  # slug translate-sponsor-intent time
  - slug: translate-sponsor-intent
    title: Map sponsor wording to checklist phases (planning only)
    goals: Interpret driver-supplied placeholders as sponsor context (not as permission to skip checklist phases or implement code/tests now). Produce a concise written mapping from that intent onto the checklist’s ordered phases so later steps formalize work without “implement the raw goal text immediately” drift.
    preconditions:
      - Sponsor strings may be supplied via checklist placeholder expansion when the agentstream driver passes --checklist-var (e.g. CHANGE_TITLE, FEATURE_GOAL, FEATURE_BEHAVIOR_SUMMARY).
    tasks:
      - |-
        Sponsor context (non-directive)—expand only from checklist vars; treat as informal intent, not executable orders.
        Title / label: {{CHANGE_TITLE}}
        Goal (sponsor): {{FEATURE_GOAL}}
        Behavior summary (sponsor): {{FEATURE_BEHAVIOR_SUMMARY}}
      - Explicitly restate that the lines above are not authorization to write production code, deliverable scripts, automated tests, or TIED YAML beyond what a later checklist step assigns.
      - Produce a numbered plan mapping sponsor intent onto checklist phases in order—for example change-definition → impact-discovery → author-requirement → author-architecture → catalog-pseudocode-contracts … → gate-pseudocode-validation → persist-implementation-records → test-strategy → unit-test-red → unit-test-green → composition-integration → verification-gate → traceable-commit—adjusted to branches that apply in this workspace. Mention where pseudo-code gates and RED precede GREEN.
      - Do not create, modify, or paste implementation files or automated tests in this step; output is the translation/plan prose only (no repo mutations required).
      - At change-definition next, refine this plan into the formal change definition (current, desired, unchanged, non-goals, success criteria); do not duplicate full REQ/IMPL authoring here.
    outcomes: Sponsor wording translated into an explicit checklist-phase plan; agent primed to follow slug order rather than imperative goal phrasing alone.
    references:
      - docs/agent-req-implementation-checklist.md § Entry Points
      - tied/processes.md § [PROC-AGENT_REQ_CHECKLIST]
    flow:
      next: change-definition
      branches: []
      calls: []
    tracking:
      status: pending
      consideration_before_proceeding: Sponsor intent mapped to checklist phases in writing; no implementation or test artifacts introduced; ready for formal change-definition.
      retry_count: 0
      returned_from: []
      state_history: []
  # slug change-definition time
  - slug: change-definition
    title: Bound problem, non-goals, and measurable success
    goals: Articulate what is changing or being added, why, what stays the same, and measurable success criteria.
    preconditions:
      - Writable workspace; no TIED tree required—pure analysis and written change definition only.
    tasks:
      - State current behavior (or "none" for a new requirement).
      - State desired behavior.
      - State unchanged behavior (explicit boundaries of what is not affected).
      - State non-goals (what this work intentionally does not address).
      - State success criteria (measurable outcomes that determine when the work is done).
      - Deliverable production code and automated tests are out of scope for this step; output is the written change definition (current, desired, unchanged, non-goals, success criteria) only.
    outcomes: A clear change definition exists. For CITDP records, this populates the change_definition section.
    references:
      - tied/processes.md § [PROC-CITDP] step 1
      - ai-principles.md § Bugs vs requirements
    flow:
      next: impact-discovery
      branches:
        - condition: Bug fix AND no REQ exists for the expected behavior
          action: GOTO author-requirement first, then return here to define the fix
          target: author-requirement
      calls: []
    tracking:
      status: pending
      consideration_before_proceeding: Change definition documented; current, desired, unchanged, non-goals, and success criteria stated; no implementation or test artifacts introduced in this step.
      retry_count: 0
      returned_from: []
      state_history: []
  # slug impact-discovery time
  - slug: impact-discovery
    title: Blast radius, tied_context, IMPL inventory (Phase A)
    goals: Identify all affected modules, tokens, code, and tests; build an IMPL inventory table that serves as the working context for the rest of the checklist.
    preconditions:
      - Change definition for this pass is available (from change-definition or equivalent context).
      - When ./tied/ is absent or indexes are missing, discovery is code-and-docs-only; defer tied-cli IMPL detail reads until TIED exists—document inventory gaps instead of inventing YAML.
    tasks:
      - Identify affected modules and functions with their tied tokens.
      - Identify module boundaries the change touches or crosses.
      - 'Build tied_context: tied_tokens_affected, tied_tokens_new.'
      - 'IMPL Discovery A1: Load each affected IMPL detail via tied-cli.sh yaml_detail_read or yaml_detail_read_many (preferred batch read); record cross_references, related_decisions (depends_on, composed_with, see_also), traceability. Resolve paths under ./tied/implementation-decisions/ only after confirming tokens via tied-cli.sh or index—do not assume files exist on disk before creation (Read failures are expected until persist-implementation-records).'
      - 'IMPL Discovery A2: Discover related IMPLs via (a) composed_with/depends_on, (b) shared REQ/ARCH tokens, (c) code_locations overlap, (d) [IMPL-*] in source/tests.'
      - 'IMPL Discovery A3: Build IMPL inventory table (IMPL token, Pseudo-code loaded, Declared code paths, Declared test paths, Verified-present code paths, Verified-present test paths, Testability). Declared columns come from IMPL traceability/code_locations for traceability only; Verified-present columns list only paths that exist on disk and are plausibly in scope for this change (per change-definition).'
      - 'Phase B/C scope: For catalog-pseudocode-contracts through flag-contradictory-specs, treat project/feature IMPLs tied to this REQ or change-definition as the primary IMPL set. Methodology IMPLs visible in merged index reads are inherited context only unless change-definition explicitly changes methodology—do not build large empty contract tables for them.'
      - 'Traceability vs workspace: TIED code_locations document where an IMPL is anchored; they do not require every listed path to exist in this checkout. Paths absent here (other layouts, methodology-only tooling, unrelated inherited IMPLs): note as N/A or out of scope for this pass; do not treat as missing implementation or block the checklist.'
      - Do not expand discovery into locating or fixing methodology or TIED-setup assets when change-definition does not concern that area.
      - IMPL inventory verified-present entries are discovery-only — not permission to create new files. Do not add or modify production source or automated tests here; new or changed implementation artifacts begin at unit-test-red (tests) and unit-test-green (production code) after pseudo-code is validated and persisted.
      - Stop expanding when no new IMPLs share code paths, REQ/ARCH tokens, or composed_with links with the current set.
    outcomes: Complete impact map; IMPL inventory table ready; all affected and related tokens identified; inherited IMPL paths interpreted per traceability rules without false blocking.
    references:
      - tied/processes.md § [PROC-CITDP] step 2
      - tied/processes.md § [PROC-IMPL_CODE_TEST_SYNC] Phase A (A1-A3)
      - tied/docs/impl-code-test-linkage.md § Phase A — Discovery
    flow:
      next: author-requirement
      branches:
        - condition: IMPL set is large (signal of high coupling)
          action: Consider whether IMPLs need decomposition before proceeding
          target: null
      calls: []
    tracking:
      status: pending
      consideration_before_proceeding: Impact map complete; IMPL inventory table built (declared vs in-scope verified paths distinguished; discovery-only); expansion stopped per criteria.
      retry_count: 0
      returned_from: []
      state_history: []
  # slug author-requirement time
  - slug: author-requirement
    title: REQ index/detail and token registration
    goals: Create or update the requirement record so the change has a formal [REQ-*] token with full traceability fields.
    preconditions:
      - ./tied/ present or creatable at workspace root; ./tied/requirements.yaml (or project index path) reachable for index operations.
      - .cursor/skills/tied-yaml/scripts/tied-cli.sh available when mutating TIED paths (per session-bootstrap); if missing, defer REQ authoring until bootstrap—do not apply_patch TIED index/detail when tied-cli is required.
    tasks:
      - Create or update the requirements index row via tied-cli.sh (yaml_index_insert / yaml_index_update) or tied_token_create_with_detail on ./tied/requirements.yaml — do not apply_patch the index file directly unless no tied-cli.sh tool covers the operation (document one-line exception).
      - Create or update REQ detail via tied-cli.sh yaml_detail_create / yaml_detail_update (prefer yaml_detail_read then small updates) at ./tied/requirements/REQ-{TOKEN}.yaml per ./tied/detail-files-schema.md § REQ (or detail-files-schema.md at template root).
      - Register the REQ token in ./tied/semantic-tokens.yaml via tied-cli.sh yaml_index_insert / yaml_index_update on index semantic-tokens.
      - CALL sub-yaml-edit-loop for each changed YAML file under ./tied/ (after tied-cli.sh writes; for direct-edit exceptions only, run lint_yaml on that absolute path inside sub-yaml-edit-loop—never raw multi-argument `yq` pretty-print on multiple paths in one process; see processes.md [PROC-YAML_EDIT_LOOP]).
    outcomes: REQ record exists in both the index and the detail file; token is registered in semantic-tokens.yaml; all YAML validated.
    references:
      - tied/processes.md § [PROC-YAML_DB_OPERATIONS] § Appending a New Record
      - tied/detail-files-schema.md § 1
      - tied/semantic-tokens.md § Token Creation Requirements
    flow:
      next: author-architecture
      branches: []
      calls:
        - sub-yaml-edit-loop
    tracking:
      status: pending
      consideration_before_proceeding: REQ index and detail file complete; token in semantic-tokens.yaml; sub-yaml-edit-loop passed for all changed files.
      retry_count: 0
      returned_from:
        - change-definition
        - resolve-pseudocode
        - sub-leap-micro-cycle
        - sync-tied-stack
      state_history: []
  # slug author-architecture time
  - slug: author-architecture
    title: ARCH decisions linked to REQ
    goals: Create or update architecture decision(s) that fulfill the REQ, with cross-references.
    preconditions:
      - REQ token and scope for this change identified (author-requirement completed or verify-only REQ exists on disk).
      - Same ./tied/ and tied-cli availability as author-requirement.
    tasks:
      - Identify architectural decisions needed (or update existing ones).
      - Create or update ./tied/architecture-decisions.yaml via tied-cli.sh yaml_index_insert / yaml_index_update; never write to ./tied/methodology/**.
      - Create or update ARCH detail at ./tied/architecture-decisions/ARCH-{TOKEN}.yaml via tied-cli.sh yaml_detail_create / yaml_detail_update per detail-files-schema § ARCH.
      - Register each new ARCH token in ./tied/semantic-tokens.yaml via tied-cli.sh yaml_index_insert / yaml_index_update on index semantic-tokens.
      - CALL sub-yaml-edit-loop for each changed YAML file under ./tied/ (direct-edit exception only with one-line logged gap per .cursor/skills/tied-yaml/SKILL.md).
      - 'Agent preload contract (ARCH-locked): After material ARCH/REQ decisions exist, create or update workspace-root agent-preload-contract.yaml (agentstream and batch runners use this file when present; default location is the workspace root, not under ./tied/ unless the project standard says otherwise). Base it on ./docs/agent-preload-contract-template.yaml, or on ./docs/agent-preload-contract-tied-repo.yaml when YAML indexes live at the repo root (TIED source layout, no ./tied/ subtree). Populate from locked REQ+ARCH, for example session_bootstrap_docs paths, tied_paths.TIED_BASE_PATH, and implementation_contract fields the ARCH decision fixes (language/stack hints, high-level target_source_paths if ARCH names roots); set active_user_intent.checklist_step_id if useful. A generic or empty preload is not a substitute for REQ+ARCH-bounded system definition; do not treat it as authoritative for implementation before REQ and ARCH exist. If this pass only adjusted cross-references and did not change stack, layout, or other constants, state in the step output that agent-preload-contract.yaml was not refreshed.'
    outcomes: ARCH records exist with REQ cross-references; tokens registered; YAML validated; client agent-preload-contract.yaml created or updated when ARCH introduced meaningful platform constants (or step output records explicit skip or not-applicable).
    references:
      - tied/processes.md § [PROC-YAML_DB_OPERATIONS]
      - tied/detail-files-schema.md § 2
      - ai-principles.md § Phase 1
      - ./docs/agent-preload-contract-template.yaml
      - ./docs/agent-preload-contract-tied-repo.yaml
    flow:
      next: catalog-pseudocode-contracts
      branches: []
      calls:
        - sub-yaml-edit-loop
    tracking:
      status: pending
      consideration_before_proceeding: ARCH index and detail files complete; tokens in semantic-tokens.yaml; sub-yaml-edit-loop passed for all changed files; agent-preload-contract.yaml at workspace root updated after meaningful ARCH changes or explicitly skipped with reason.
      retry_count: 0
      returned_from:
        - resolve-pseudocode
        - sub-leap-micro-cycle
        - sync-tied-stack
      state_history: []
  # slug catalog-pseudocode-contracts time
  - slug: catalog-pseudocode-contracts
    title: Read essence_pseudocode; extract contracts (Phase B)
    goals: Catalog IMPL pseudo-code contracts for reasoning and validation.
    preconditions:
      - IMPL inventory from impact-discovery lists IMPL tokens; each target has or will have essence_pseudocode (readable detail or working draft in scope).
      - When no IMPL detail files exist yet, defer cataloging until after draft pseudo-code exists—skip with explicit note rather than inventing contracts.
