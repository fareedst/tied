    agentstream_new_session: true
    title: One failing test per pseudo-code block (Phase D)
    goals: Map pseudo-code to a failing test.
    preconditions:
      - Target IMPL essence_pseudocode is token-commented per [PROC-IMPL_PSEUDOCODE_TOKENS] for blocks under test.
      - gate-pseudocode-validation satisfied (or documented waiver) and persist-implementation-records completed for the IMPL set in scope.
