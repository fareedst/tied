# Documentation-first subset extracted from the agent requirement implementation checklist.
# This file keeps only the steps from session bootstrap through IMPL authoring and
# persistence. No code or tests are written; success is measured by complete,
# token-commented, validated REQ/ARCH/IMPL YAML and pseudo-code.
#
# Use this subset to test CITDP analysis, LEAP documentation flow, pseudo-code
# validation, and YAML/token discipline before running the full checklist or the
# TDD-only loop.
name: documentation_first_loop
description: |
  Documentation-first subset extracted from docs/agent-req-implementation-checklist.yaml. Run from session-bootstrap through persist-implementation-records; exit when all REQ/ARCH/IMPL records are complete, token-commented, validated, and persisted. No steps after persist-implementation-records (risk-assessment onward).
source_document: docs/agent-req-implementation-checklist.yaml
process_token: '[PROC-AGENT_REQ_CHECKLIST]'
version: 1.2.0
last_updated: "2026-04-21"
scope:
  - session bootstrap and governing docs
  - sponsor intent translated to checklist phases (when agentstream passes FEATURE_* vars)
  - change definition and impact analysis (CITDP)
  - REQ/ARCH/IMPL authoring and traceability
  - IMPL pseudo-code: contracts, insufficient/contradictory spec resolution, block token comments
  - pseudo-code validation ([PROC-PSEUDOCODE_VALIDATION])
  - persist IMPL index and detail; sub-yaml-edit-loop on all changed files
exit_when:
  - All REQ/ARCH/IMPL records for the change are complete and persisted.
  - IMPL essence_pseudocode is token-commented and passes pseudo-code validation.
  - All changed YAML files have passed sub-yaml-edit-loop (lint_yaml + tied_validate_consistency per runbook).
excluded_from_this_subset:
  - risk-assessment
  - test-strategy
  - unit-test-red / unit-test-green / unit-refactor / three-way-alignment-unit (unit TDD)
  - composition-integration
  - end-to-end-ui
  - verification-gate
  - sync-tied-stack
  - user-facing-release-notes
  - persist-citdp-record
  - traceable-commit
steps:
  - slug: session-bootstrap
    title: Session Bootstrap
    stage: bootstrap
    goals: Confirm access to governing TIED documents; establish session context.
    tasks:
      - Preface with "Observing AI principles!"
      - Read tied/docs/ai-principles.md; review semantic-tokens, architecture-decisions, implementation-decisions (YAML + guides).
      - Confirm TIED MCP availability if applicable; understand priority order.
    outcomes: Session context established; governing docs read.
  - slug: translate-sponsor-intent
    title: Map sponsor wording to checklist phases (planning only)
    stage: bootstrap
    goals: Treat FEATURE_* checklist vars as informal sponsor context; produce a numbered map to checklist phases—not code.
    tasks:
      - 'Sponsor context (non-directive): {{CHANGE_TITLE}} | Goal: {{FEATURE_GOAL}} | Behavior: {{FEATURE_BEHAVIOR_SUMMARY}}'
      - Map intent onto phases through persist-implementation-records (documentation-first scope); no implementation files or automated tests here.
      - Next step formalizes this into change-definition.
    outcomes: Sponsor wording mapped to phases; ready for change-definition.
  - slug: change-definition
    title: Define Change or New Requirement
    stage: citdp
    goals: Articulate current/desired/unchanged behavior, non-goals, success criteria.
    tasks:
      - State current behavior (or "none" for new requirement).
      - State desired behavior, unchanged behavior, non-goals, success criteria.
    outcomes: Clear change definition for CITDP.
  - slug: impact-discovery
    title: Impact Analysis and IMPL Discovery
    stage: citdp
    goals: Build impact map and IMPL inventory table.
    tasks:
      - Identify affected modules, tokens, code, tests; build tied_context.
      - IMPL Discovery A1–A3: load IMPL details, discover related IMPLs, build IMPL inventory table.
      - Stop expansion when set stabilizes.
    outcomes: Impact map and IMPL inventory ready.
  - slug: author-requirement
    title: Author/Update REQ
    stage: authoring
    goals: Create or update requirement record with full traceability.
    tasks:
      - Create/update requirements.yaml and REQ detail file; register token in semantic-tokens.yaml.
      - CALL sub-yaml-edit-loop for each changed file.
    outcomes: REQ record and token registered; YAML validated.
  - slug: author-architecture
    title: Author/Update ARCH
    stage: authoring
    goals: Create or update architecture decision(s) fulfilling the REQ.
    tasks:
      - Create/update architecture-decisions.yaml and ARCH detail; register tokens.
      - CALL sub-yaml-edit-loop for each changed file.
    outcomes: ARCH records with REQ cross-refs; YAML validated.
  - slug: catalog-pseudocode-contracts
    title: Read and Catalog Contracts (Phase B)
    stage: impl
    goals: Catalog IMPL pseudo-code contracts (INPUT/OUTPUT/DATA, procedures, branches, loops).
    outcomes: Contracts cataloged.
  - slug: flag-insufficient-specs
    title: Identify Insufficient Specs
    stage: impl
    goals: Flag missing INPUT/OUTPUT, undefined procedures, missing token comments, etc.
    outcomes: All insufficient specs flagged.
  - slug: flag-contradictory-specs
    title: Identify Contradictory Specs
    stage: impl
    goals: Compare across IMPLs for conflicts (DATA, ordering, OUTPUT types).
    outcomes: Contradictions identified; refactor if irreconcilable.
  - slug: resolve-pseudocode
    title: Resolve and Update
    stage: impl
    goals: Resolve flag-insufficient-specs / flag-contradictory-specs issues; update pseudo-code; GOTO author-architecture / author-requirement if scope changes.
    outcomes: All issues resolved; contracts compatible.
  - slug: apply-token-comments
    title: Apply Block Token Comments (Phase C)
    stage: impl
    goals: Apply [PROC-IMPL_PSEUDOCODE_TOKENS] to every block; document cross-IMPL dependencies.
    outcomes: Every block has token comments; dependencies documented.
  - slug: gate-pseudocode-validation
    title: Run Pseudo-Code Validation
    stage: impl
    goals: Run sub-pseudocode-validation-pass; satisfy gating rules or document waiver.
    tasks:
      - CALL sub-pseudocode-validation-pass per tied/docs/pseudocode-validation-checklist.yaml.
      - Do not proceed to persist-implementation-records until gating rules pass or waiver documented.
    outcomes: Pseudo-code validation passed; gating satisfied.
  - slug: persist-implementation-records
    title: Persist IMPL Records
    stage: impl
    goals: Write IMPL index and detail files; register tokens; sub-yaml-edit-loop.
    outcomes: IMPL pseudo-code persisted; all YAML validated. EXIT documentation-first subset.
references:
  - docs/agent-req-implementation-checklist.md
  - docs/agent-req-implementation-checklist.yaml
  - docs/pseudocode-writing-and-validation.md
  - docs/pseudocode-validation-checklist.yaml
  - tied/processes.md (§ CITDP, IMPL_CODE_TEST_SYNC Phases B–C, PROC-IMPL_PSEUDOCODE_TOKENS, PROC-PSEUDOCODE_VALIDATION)
