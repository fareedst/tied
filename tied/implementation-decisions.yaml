IMPL-TIED_FILES:
  name: TIED File Creation
  status: Active
  cross_references:
    - ARCH-TIED_STRUCTURE
    - REQ-TIED_SETUP
  rationale:
    why: Implements ARCH-TIED_STRUCTURE and realizes REQ-TIED_SETUP by creating the foundational TIED directory structure and files
    problems_solved:
      - Manual setup of TIED structure is error-prone
      - Inconsistent project structure across implementations
      - Missing required TIED files and directories
    benefits:
      - Automated, consistent TIED setup
      - All required files and directories created correctly
      - Easy project bootstrapping with single command
  implementation_approach:
    summary: Bootstrap script that creates tied/ directory, copies template files, and sets up base files
    details:
      - Create tied/ directory at project root
      - Copy YAML index files from templates (requirements.yaml, architecture-decisions.yaml, implementation-decisions.yaml, semantic-tokens.yaml)
      - Copy guide files from templates (semantic-tokens.md, processes.md, commit-guidelines.md)
      - Create detail subdirectories (requirements/, architecture-decisions/, implementation-decisions/)
      - Copy base files to project root (.cursorrules, AGENTS.md, ai-principles.md)
  code_locations:
    files:
      - path: copy_files.sh
        description: Bootstrap script that sets up TIED structure
        lines:
          - 1
          - 352
  traceability:
    architecture:
      - ARCH-TIED_STRUCTURE
    requirements:
      - REQ-TIED_SETUP
    tests:
      - Manual verification checklists
    code_annotations:
      - IMPL-TIED_FILES
      - ARCH-TIED_STRUCTURE
      - REQ-TIED_SETUP
  related_decisions:
    depends_on: []
    supersedes: []
    see_also:
      - ARCH-TIED_STRUCTURE
      - REQ-TIED_SETUP
  essence_pseudocode: |-
    # [IMPL-TIED_FILES] [ARCH-TIED_STRUCTURE] [REQ-TIED_SETUP]
    # Summary: Bootstrap TIED layout from templates via copy_files.sh — indexes, guides, detail dirs, AGENTS.md family.

    # How: Contract — INPUT/OUTPUT/DATA for BOOTSTRAP_TIED below (same IMPL/ARCH/REQ); not separate downstream IMPL calls.
    # How: INPUT — project root; template source directory (TIED repo templates/ or equivalent).
    # How: OUTPUT — created or updated files under tied/ and selected root files; process exit status.
    # How: DATA — requirements.yaml, architecture-decisions.yaml, implementation-decisions.yaml, semantic-tokens.yaml; methodology tree under tied/methodology/ when copied.

    procedure BOOTSTRAP_TIED(projectRoot):
      # How: Ensure tied/ exists; copy template indexes and guides; create detail subdirs; copy AGENTS.md, .cursorrules, ai-principles.md per script merge rules.
      # How: Failure path — operator must fix paths or permissions before retry.
      ON missing template source or unwritable destination: exit non-zero with actionable message
      # How: Loop — apply copy_files.sh matrix; shell-only; no cross-IMPL composition in this procedure.
      FOR each copy_files.sh target: apply copy or merge policy; never overwrite client project-only YAML with empty templates where script forbids
      # How: Success — TIED tree ready for REQ/ARCH/IMPL detail files in project scope.
      RETURN success
  detail_file: implementation-decisions/IMPL-TIED_FILES.yaml
  metadata:
    created:
      date: 2025-12-18T00:00:00.000Z
      author: AI Agent
    last_updated:
