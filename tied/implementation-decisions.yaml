      - IMPL-GOAGENT-EXECUTOR
  essence_pseudocode: |-
    # [IMPL-GOAGENT-CLI-CMD] [ARCH-GOAGENT-CLI] [REQ-GOAGENT-CLI-CONFIG]
    # Summary: Parse argv, resolve defaults, validate, branch preview vs pipeline vs executor — unified CLI.

    # How: Composition order (same IMPL as entrypoint): config.ParseAndResolve → optional IMPL-GOAGENT-FEATURESPEC Preview (early exit) → IMPL-GOAGENT-PIPELINE.Build → dry-run OR per-turn IMPL-GOAGENT-EXECUTOR. Shared DATA: []Turn and session id string; pre — cwd + os.Args; post — process exit. No MCP IMPL overlap (separate processes).

    procedure main:
      # [IMPL-GOAGENT-CLI-CMD] [ARCH-GOAGENT-CLI] [REQ-GOAGENT-CLI-CONFIG]
      # How: config.ParseAndResolve in tools/agentstream/config (same IMPL token as this CMD record); includes --lead-checklist-from-step and --lead-checklist-to-step ([REQ-GOAGENT-YAML-STEP-RENDER]).
      cfg := ParseAndResolve(cwd, os.Args[1:])
      ON ParseAndResolve error: if help sentinel print usage and exit 0; else print error and exit non-zero
      # [IMPL-GOAGENT-FEATURESPEC] [ARCH-GOAGENT-YAML-FEATURESPEC] [REQ-GOAGENT-FEATURESPEC-BATCH]
      # How: Cross-IMPL call — featurespec.Preview only; does not invoke IMPL-GOAGENT-PIPELINE.
      if cfg.PreviewFeatureSpecBatchYAML != "":
        featurespec.Preview(...)
        exit 0
      # [IMPL-GOAGENT-PIPELINE] [ARCH-GOAGENT-PIPELINE] [REQ-GOAGENT-PIPELINE-CHAIN] [REQ-GOAGENT-CLI-CONFIG] [REQ-GOAGENT-YAML-STEP-RENDER]
      # How: Cross-IMPL call — pipeline.Build composes IMPL-GOAGENT-TEXT-SOURCES, IMPL-GOAGENT-TDDLOOP, IMPL-GOAGENT-FEATURESPEC, IMPL-GOAGENT-CHECKLIST into one []Turn (types IMPL-GOAGENT-LIB-TYPES); Input carries checklist step bounds from cfg.
      turns := pipeline.Build(...)
      ON pipeline.Build error: exit non-zero with error
      if cfg.DryRun:
        # How: Local dry-run printer (same package as main); uses turns from IMPL-GOAGENT-PIPELINE only.
        runDryRun(...)
      else:
        for each turn:
          # [IMPL-GOAGENT-EXECUTOR] [ARCH-GOAGENT-EXECUTOR] [REQ-GOAGENT-AGENT-EXECUTOR]
          # How: Cross-IMPL call — executor.AgentArgv / executor.Run; Turn.Parts from IMPL-GOAGENT-LIB-TYPES; SessionForTurn/ChainBetween from IMPL-GOAGENT-PIPELINE helpers in main.
          argv := executor.AgentArgv(...)
          sid, code, err := executor.Run(...)
          ON executor.Run error or empty session id when required: exit with code and message per main.go contract
          require sid non-empty (Ruby parity)
