      result: pass
IMPL-MODULE_VALIDATION:
  name: Module Validation Implementation
  status: Active
  cross_references:
    - ARCH-MODULE_VALIDATION
    - REQ-MODULE_VALIDATION
  rationale:
    why: Implements REQ-MODULE_VALIDATION requirement and ARCH-MODULE_VALIDATION strategy to ensure modules are validated independently before integration
    problems_solved:
      - Complexity-related bugs discovered too late
      - Difficult to debug integration issues
      - Module contracts not validated before integration
    benefits:
      - Bugs caught early in development cycle
      - Easier debugging by isolating issues to specific modules
      - Clear validation criteria for each module
      - Reduced integration complexity
  implementation_approach:
    summary: 'Five-phase approach: module identification, independent development, independent validation, documentation, and integration'
    details:
      - 'Phase 1: Identify modules and document boundaries, interfaces, contracts, dependencies, validation criteria'
      - 'Phase 2: Develop module independently with dependency injection'
      - 'Phase 3: Validate independently with unit tests (mocked dependencies), contract validation, edge cases, error handling, integration tests with test doubles'
      - 'Phase 4: Document validation results including passed tests, limitations, assumptions'
      - 'Phase 5: Integrate only after validation passes, with integration tests validating combined behavior'
  code_locations:
    files:
      - path: '*_module_test.[ext]'
        description: Module validation test files
      - path: '*_validation_test.[ext]'
        description: Module validation test files (alternate pattern)
      - path: '*_integration_test.[ext]'
        description: Integration test files
    functions:
      - name: testModuleName_IndependentValidation_REQ_MODULE_VALIDATION
        file: various test files
        description: Module validation test function pattern
  traceability:
    architecture:
      - ARCH-MODULE_VALIDATION
    requirements:
      - REQ-MODULE_VALIDATION
    tests:
      - testModuleName_IndependentValidation_REQ_MODULE_VALIDATION
    code_annotations:
      - IMPL-MODULE_VALIDATION
      - REQ-MODULE_VALIDATION
  related_decisions:
    depends_on: []
    supersedes: []
    see_also:
      - ARCH-MODULE_VALIDATION
      - REQ-MODULE_VALIDATION
  essence_pseudocode: |-
    # [IMPL-MODULE_VALIDATION] [ARCH-MODULE_VALIDATION] [REQ-MODULE_VALIDATION]
    # Summary: Five-phase lifecycle — identify module boundaries, build with DI, validate in isolation, document, integrate only when green.

    # How: Contract — INPUT/OUTPUT/CONTROL for MODULE_VALIDATION_LIFECYCLE below (same IMPL/ARCH/REQ).
    # How: INPUT — module boundary spec; interfaces; mocks and test doubles.
    # How: OUTPUT — validation evidence (passing tests, notes); go/no-go for integration.
    # How: CONTROL — integration blocked until independent validation passes.

    procedure MODULE_VALIDATION_LIFECYCLE:
      # How: Phases 1–5 — document boundaries; implement with DI; unit + contract + edge-case tests; record results; integration tests on combined behavior.
      # How: Gate — blocks integration with other IMPLs until module-local validation passes (ordering: validate before compose).
      # How: Branch — validation or documentation failure; no integration until fixed.
      IF phase 3 or 4 fails: RETURN without integration; fix module or revise boundaries
      # How: Branch — combined behavior contradicts module contracts after integration attempt.
      IF phase 5 fails: RETURN; treat as integration defect against documented contracts
  detail_file: implementation-decisions/IMPL-MODULE_VALIDATION.yaml
  metadata:
    created:
      date: 2025-12-18T00:00:00.000Z
      author: AI Agent
    last_updated:
      date: 2026-03-30T00:00:00.000Z
      author: AI Agent
      reason: S06.5 [PROC-AGENT_REQ_CHECKLIST] [PROC-IMPL_PSEUDOCODE_TOKENS] Phase C procedure + contract How lines
    last_validated:
      date: 2026-02-06T00:00:00.000Z
      validator: AI Agent
      result: pass
IMPL-MCP_FEEDBACK_TOOLS:
  name: MCP Feedback Tools (tied_feedback_add, tied_feedback_export)
  status: Active
  cross_references:
    - ARCH-FEEDBACK_STORAGE
    - REQ-FEEDBACK_TO_TIED
  rationale:
    why: Implement REQ-FEEDBACK_TO_TIED and ARCH-FEEDBACK_STORAGE via two MCP tools and a testable feedback module
    problems_solved:
      - No programmatic way to add or export feedback from a TIED project
    benefits:
      - Projects can record and export feedback for the TIED project
      - Logic in pure/testable module; handlers stay thin
  implementation_approach:
    summary: Feedback module (load/append/export) under mcp-server/src/feedback.ts; two tool handlers in tools/index.ts
    details:
      - 'getFeedbackPath(basePath?): resolve {base}/feedback.yaml'
      - 'loadFeedback(basePath?): read YAML or return { entries: [] }; create file if missing on first append'
      - 'appendEntry(params): validate type/title/description; generate id (e.g. timestamp-based); set created_at; append to entries; write file'
      - 'exportMarkdown(entries), exportJson(entries): format all entries for report'
      - 'tied_feedback_add: parse args, call appendEntry, return ok/id/created_at and optional report_snippet (markdown)'
      - 'tied_feedback_export: load entries, call exportMarkdown or exportJson, return string'
  code_locations:
    files:
      - path: mcp-server/src/feedback.ts
        description: Feedback load/append/export logic [REQ-FEEDBACK_TO_TIED] [ARCH-FEEDBACK_STORAGE] [IMPL-MCP_FEEDBACK_TOOLS]
      - path: mcp-server/src/feedback.test.ts
        description: Unit tests for feedback module
      - path: mcp-server/src/tools/index.ts
        description: Tool handlers tied_feedback_add, tied_feedback_export
    functions:
      - name: loadFeedback
        file: mcp-server/src/feedback.ts
        description: Load feedback.yaml or default structure
      - name: appendEntry
        file: mcp-server/src/feedback.ts
        description: Append one entry with id and created_at
      - name: exportMarkdown
        file: mcp-server/src/feedback.ts
        description: Export entries as markdown for TIED report
      - name: exportJson
        file: mcp-server/src/feedback.ts
        description: Export entries as JSON string
  traceability:
    architecture:
      - ARCH-FEEDBACK_STORAGE
    requirements:
      - REQ-FEEDBACK_TO_TIED
    tests:
      - feedback.test.ts
    code_annotations:
      - IMPL-MCP_FEEDBACK_TOOLS
      - ARCH-FEEDBACK_STORAGE
      - REQ-FEEDBACK_TO_TIED
  related_decisions:
    depends_on: []
    supersedes: []
    see_also:
      - ARCH-FEEDBACK_STORAGE
      - REQ-FEEDBACK_TO_TIED
  essence_pseudocode: |-
    # [IMPL-MCP_FEEDBACK_TOOLS] [ARCH-FEEDBACK_STORAGE] [REQ-FEEDBACK_TO_TIED]
    # Summary: Pure feedback module loads/appends/exports feedback.yaml; MCP handlers stay thin JSON envelopes.

    # How: INPUT/OUTPUT/DATA contract for feedback module (same IMPL/ARCH/REQ). Composition: independent of IMPL-MCP_LEAP_PROPOSAL_QUEUE — distinct paths (feedback.yaml vs leap-proposals/); no shared mutable DATA at runtime.

    # INPUT: optional basePath (TIED root); append params (type, title, description, optional context); export format (markdown|json).
    # OUTPUT: structured entries; add returns ok, id, created_at, optional report_snippet; export returns formatted string; file on disk under {base}/feedback.yaml.
    # DATA: feedback.yaml schema with entries[]; ids and timestamps.

    # procedure loadFeedback(basePath):
    # [IMPL-MCP_FEEDBACK_TOOLS] [ARCH-FEEDBACK_STORAGE] [REQ-FEEDBACK_TO_TIED]
    # How: Resolve path via getFeedbackPath; read YAML or default { entries: [] }.
    # How: Corrupt YAML — deterministic recovery per feedback.ts tests.
    ON parse error: return safe empty structure or surface error per module policy (tests lock behavior)

    # procedure appendEntry(params):
    # [IMPL-MCP_FEEDBACK_TOOLS] [ARCH-FEEDBACK_STORAGE] [REQ-FEEDBACK_TO_TIED]
    # How: Validate type/title/description; generate id; set created_at; append; write file.
    # How: IO/validation failure surfaces to MCP handler envelope.
    ON IO or validation error: propagate to caller for MCP { ok: false, error }

    # procedure MCP_HANDLER tied_feedback_add / tied_feedback_export:
    # [IMPL-MCP_FEEDBACK_TOOLS] [ARCH-FEEDBACK_STORAGE] [REQ-FEEDBACK_TO_TIED]
    # How: Parse tool args; delegate to module; return JSON payload (thin wrapper over loadFeedback/appendEntry/export* only).
  detail_file: implementation-decisions/IMPL-MCP_FEEDBACK_TOOLS.yaml
  metadata:
    created:
      date: 2026-03-03T00:00:00.000Z
      author: AI Agent
    last_updated:
