REQ-ATDD-E2E-AGENT_STREAM:
  name: E2E agent subprocess stream-json harness with session resume
  category: Functional
  priority: P1
  status: Implemented
  rationale:
    why: The Cursor agent CLI must run as an external process; streamed NDJSON must surface assistant and thinking text and capture session_id for chained turns
    problems_solved:
      - No in-process API for stream-json
      - Session continuity across multiple turns in one invocation
    benefits:
      - Automates PROC-AGENT_REQ_CHECKLIST and TDD loop YAML as sequential agent turns
    upstream_note: Imported from atdd commit eb88236290009b78eb11ea561816f0854176bf12
  satisfaction_criteria:
    - criterion: Each turn invokes agent with stream-json; stdout lines parse as JSON; text fragments print to stdout
    - criterion: session_id captured from stream and printed on stderr for resume; non-zero exit on agent failure
  validation_criteria:
