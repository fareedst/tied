      - IMPL-TIED_FILES
    tests:
      - Manual verification checklists
    code_annotations:
      - IMPL-TIED_FILES
      - ARCH-TIED_STRUCTURE
      - REQ-TIED_SETUP
  related_requirements:
    depends_on: []
    related_to: []
    supersedes: []
