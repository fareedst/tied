REQ-FEEDBACK_TO_TIED:
  name: Feedback to TIED (Feature Requests, Bug Reports, Methodology)
  category: Functional
  priority: P1
  status: Implemented
  rationale:
    why: Projects and users need a standard way to submit feature requests, bug reports, and methodology improvement suggestions and to report them to the TIED project
    problems_solved:
      - No structured way to collect feedback from TIED adopters
      - Methodology improvements from the field are not easily reported upstream
    benefits:
      - Structured feedback stored under the project TIED tree
      - Export format suitable for reporting to the TIED project (e.g. GitHub issues)
      - Traceability of feedback types (feature_request, bug_report, methodology_improvement)
  satisfaction_criteria:
    - criterion: MCP tools allow adding feedback entries (type, title, description, optional context)
      metric: tied_feedback_add creates/updates tied/feedback.yaml
    - criterion: Feedback can be exported for reporting to TIED
      metric: tied_feedback_export returns markdown or JSON of all entries
  validation_criteria:
