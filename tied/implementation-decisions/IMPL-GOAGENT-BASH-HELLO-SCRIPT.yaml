  essence_pseudocode: |-
    # [IMPL-GOAGENT-BASH-HELLO-SCRIPT] [ARCH-GOAGENT-BASH-HELLO-SCRIPT] [REQ-GOAGENT-BASH-HELLO-SCRIPT]
    # Summary: Root Bash smoke script (hello_world.sh or hello.sh) prints one line "Hello World!" with newline and exits 0 under strict mode; Go resolves, runs bash, asserts OUTPUT; COMPOSE_SCRIPT_ENTRY_SMOKE_FROM_ROOT wires modules for harnesses (no UI).

    # How: Contract block — INPUT/OUTPUT/DATA/CONTROL for SCRIPT_ENTRY and UNIT_TEST_SCRIPT_ENTRY below (same IMPL/ARCH/REQ).
    # How: INPUT — (SCRIPT_ENTRY) none; stdin unused; cwd is caller-defined when invoking ./script.
    # How: OUTPUT — stdout exactly one line "Hello World!" with trailing newline; exit status 0 on success.
    # How: DATA — HELLO_SCRIPT_CANDIDATES ordered list (hello_world.sh, hello.sh); strict shell options -euo pipefail for SCRIPT_ENTRY.
    # How: CONTROL — at most one candidate need exist per workspace; identical script body for either basename; ordering explicit for resolution.

    # [IMPL-TIED_FILES] [ARCH-TIED_STRUCTURE] [REQ-TIED_SETUP]
    # How: related_decisions.depends_on — checklist workspaces assume project root and tied/ layout from BOOTSTRAP_TIED (IMPL-TIED_FILES); SCRIPT_ENTRY does not invoke copy_files.sh. Shared surface: project root path only. Ordering: bootstrap or copy_files before relying on TIED paths for other steps; smoke script order-independent once files exist. Pre/post: none required for printf path beyond file existing at chosen basename.

    # [IMPL-GOAGENT-EXECUTOR] [ARCH-GOAGENT-EXECUTOR] [REQ-GOAGENT-AGENT-EXECUTOR]
    # How: related_decisions.see_also — NDJSON agent subprocess entrypoint; no code_locations overlap with hello_world.sh, hello.sh, or hello_world_script_entry_test.go. No shared mutable DATA with SCRIPT_ENTRY. Ordering: smoke and executor are independent; smoke may run without executor.

    procedure SCRIPT_ENTRY:
      # How: Same steps for whichever conventional filename the workspace uses.
      emit shebang line "#!/usr/bin/env bash"
      emit comment lines naming IMPL ARCH REQ and How SCRIPT_ENTRY
      run shell builtin: set -euo pipefail
      run printf with format '%s\n' and single argument 'Hello World!' to stdout
      exit with status 0
      # How: Fallible path under strict mode — non-zero exit; success contract fails if stdout shape wrong.
      ON any command failure under strict mode: exit non-zero; stdout must not satisfy success contract

    procedure RESOLVE_HELLO_SCRIPT_BASENAME(moduleRoot):
      # How: Prefer hello_world.sh (stdd) then hello.sh (checklist clients); fail closed if neither regular file exists.
      FOR each name IN HELLO_SCRIPT_CANDIDATES in order:
        IF regular file exists at moduleRoot joined with name: RETURN name
      RETURN error missing smoke script expected one of hello_world.sh or hello.sh

    procedure UNIT_TEST_SCRIPT_ENTRY:
      # How: Module root from runtime.Caller; internal ordering — resolve basename before spawn.
      derive moduleRoot from runtime.Caller(0) test file directory
      # How: CALL RESOLVE_HELLO_SCRIPT_BASENAME — same IMPL/ARCH/REQ; must succeed before bash.
      basename = CALL RESOLVE_HELLO_SCRIPT_BASENAME(moduleRoot)
      ON basename is error: FAIL test with error message
      spawn bash with argv [basename] and working directory moduleRoot
      capture stdout; wait process completion
      # How: Fallible path — surface stderr when exec.ExitError available.
      ON process error not nil or exit status not 0: FAIL test including stderr if captured
      assert stdout string equals literal "Hello World!\n"

    procedure COMPOSE_SCRIPT_ENTRY_SMOKE_FROM_ROOT(moduleRoot):
      # How: Composition binding (Phase G) — wires RESOLVE, bash subprocess stdout, and OUTPUT assert; no UI; entry for harnesses.
      basename = CALL RESOLVE_HELLO_SCRIPT_BASENAME(moduleRoot)
      ON basename is error: RETURN error upstream
      out = CALL BashScriptStdout(moduleRoot, basename)
      ON bash error: RETURN error with context
      RETURN AssertScriptEntryStdoutContract(out) as error

    # Phase H — E2E ([PROC-IMPL_CODE_TEST_SYNC]): No UI-only or platform-inseparable behavior for [REQ-GOAGENT-BASH-HELLO-SCRIPT] under [IMPL-GOAGENT-BASH-HELLO-SCRIPT].
    # How: Manual ./hello_world.sh or ./hello.sh is operator smoke only, not a substitute for automated composition; no testability e2e_only / e2e_only_reason on this IMPL.
