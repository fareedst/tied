IMPL-ATDD-E2E-AGENT_STREAM:
  name: run_agent_stream main loop and run_stream subprocess harness
  status: Active
  cross_references:
    - ARCH-ATDD-E2E_SUBPROCESS_STREAM_JSON
    - REQ-ATDD-E2E-AGENT_STREAM
  decision: Spawn agent with Open3; parse NDJSON lines; print assistant/thinking text; capture session_id for chained turns and stderr.
  rationale:
    why: Orchestrates turns with agent_command and run_stream; chains session_id between turns
    problems_solved:
      - Multi-turn automation with single Ruby process
    benefits:
      - stderr session_id= enables manual resume later
    upstream_note: tools/agent-stream/run_agent_stream.rb; atdd eb88236290009b78eb11ea561816f0854176bf12
  implementation_approach:
    summary: For each turn build argv for agent CLI; run_stream parses NDJSON; dry-run mode skips subprocess
    details:
      - extract_text_fragments for thinking and assistant events
      - Open3.popen3 streaming
  code_locations:
    files:
      - path: tools/agent-stream/run_agent_stream.rb
        description: '[REQ-ATDD-E2E-AGENT_STREAM] [ARCH-ATDD-E2E_SUBPROCESS_STREAM_JSON] [IMPL-ATDD-E2E-AGENT_STREAM] main and run_stream'
  traceability:
    architecture:
      - ARCH-ATDD-E2E_SUBPROCESS_STREAM_JSON
    requirements:
      - REQ-ATDD-E2E-AGENT_STREAM
    tests:
      - agent_stream_e2e_test.rb (upstream atdd)
    code_annotations:
      - IMPL-ATDD-E2E-AGENT_STREAM
  related_decisions:
    depends_on: []
    supersedes: []
    see_also:
      - IMPL-ATDD-COMPOS-AGENT_STREAM_ARGV
  essence_pseudocode: |-
    # [REQ-MODULE_VALIDATION] [ARCH-MODULE_VALIDATION] [IMPL-MODULE_VALIDATION] — E2E harness justified by external CLI only
    # [IMPL-ATDD-E2E-AGENT_STREAM] [ARCH-ATDD-E2E_SUBPROCESS_STREAM_JSON] [REQ-ATDD-E2E-AGENT_STREAM]
    # Summary: Execute agent subprocess with stream-json; surface text; capture session_id — E2E-only harness.
    procedure run_agent_stream_subprocess(cmd):
      # [IMPL-ATDD-E2E-AGENT_STREAM] [ARCH-ATDD-E2E_SUBPROCESS_STREAM_JSON] [REQ-ATDD-E2E-AGENT_STREAM]
      # How: Spawn subprocess with Open3 — satisfies ARCH external CLI boundary.
      spawn agent subprocess with cmd via Open3.popen3
      # [IMPL-ATDD-E2E-AGENT_STREAM] [ARCH-ATDD-E2E_SUBPROCESS_STREAM_JSON] [REQ-ATDD-E2E-AGENT_STREAM]
      # How: Forward stderr to host stderr — REQ observability for agent errors.
      forward agent stderr stream to process stderr (async)
      # [IMPL-ATDD-E2E-AGENT_STREAM] [ARCH-ATDD-E2E_SUBPROCESS_STREAM_JSON] [REQ-ATDD-E2E-AGENT_STREAM]
      # How: Line-by-line JSON parse and fragment extraction — REQ stream-json protocol.
      for each non-empty line on stdout:
        parse line as JSON object
        capture session_id from object if present
        extract_text_fragments(object) to stdout (thinking deltas and assistant text parts)
        print newline after thinking completed events as needed
      # [IMPL-ATDD-E2E-AGENT_STREAM] [ARCH-ATDD-E2E_SUBPROCESS_STREAM_JSON] [REQ-ATDD-E2E-AGENT_STREAM]
      # How: Fail closed on non-zero exit — REQ reliable exit status.
      require exit status success or exit with agent status
      # [IMPL-ATDD-E2E-AGENT_STREAM] [ARCH-ATDD-E2E_SUBPROCESS_STREAM_JSON] [REQ-ATDD-E2E-AGENT_STREAM]
      # How: Emit session_id on stderr for resume — REQ chaining for multi-turn.
      print session_id=<captured> on stderr when captured
      return captured session id to caller for next turn --resume
  detail_file: implementation-decisions/IMPL-ATDD-E2E-AGENT_STREAM.yaml
