IMPL-GOAGENT-PIPELINE:
  name: pipeline.Build ordered assembly
  status: Active
  cross_references:
    - ARCH-GOAGENT-PIPELINE
    - REQ-GOAGENT-PIPELINE-CHAIN
  essence_pseudocode: |-
    # [IMPL-GOAGENT-PIPELINE] [ARCH-GOAGENT-PIPELINE] [REQ-GOAGENT-PIPELINE-CHAIN]
    # Summary: Concatenate argv, prompts-file, tdd, feature-spec, checklist, verify into []Turn; --prompt-file bodies are prepended by the CLI after Build/slice via ReadPromptFilePreload + ApplyPromptFilePreload (not separate Build turns).

    # How: Composition — sequential cross-IMPL calls only; shared DATA is accumulated []Turn in memory (Turn from IMPL-GOAGENT-LIB-TYPES). Caller: IMPL-GOAGENT-CLI-CMD supplies pipeline.Input. Ordering matches IMPL-ATDD-COMPOS-AGENT_STREAM_ARGV / AgentStreamArgv Ruby parity.

    procedure pipeline_Build(in):
      # [IMPL-GOAGENT-PIPELINE] [ARCH-GOAGENT-PIPELINE] [REQ-GOAGENT-PIPELINE-CHAIN]
      # How: Fixed order = argv, prompts-file, tdd-yaml, feature-spec-batch-yaml, lead-checklist-yaml, verify-session. Prompt-file paths are not appended here; ApplyPromptFilePreload prepends one argv part per file on each turn where SessionForTurn would omit --resume. Only feature-spec LoadTurns sets ChainFromPrevious=false per record; argv, prompts, tdd, checklist loaders set ChainFromPrevious=true (REQ-GOAGENT-PIPELINE-CHAIN: feature-spec breaks session chain; other consecutive turns resume).
      # How: Cross-IMPL — IMPL-GOAGENT-TEXT-SOURCES ([ARCH-GOAGENT-TEXT-SOURCES] [REQ-GOAGENT-TEXT-SOURCES]): ArgvTurn, TurnsFromPromptsFiles, VerifySessionTurn.
      turns += text.ArgvTurn(in.ArgvWords)
      turns += text.TurnsFromPromptsFiles(in.PromptsFiles) with error propagation
      # How: Cross-IMPL — IMPL-GOAGENT-TDDLOOP ([ARCH-GOAGENT-YAML-STEPS] [REQ-GOAGENT-YAML-STEP-RENDER]): LoadTurns per TddYAML path.
      for each tdd path in in.TddYAMLPaths: turns += tddloop.LoadTurns(path) with error propagation
      # How: Cross-IMPL — IMPL-GOAGENT-FEATURESPEC ([ARCH-GOAGENT-YAML-FEATURESPEC] [REQ-GOAGENT-FEATURESPEC-BATCH]): LoadTurns per feature-spec path.
      for each feature path in in.FeatureSpecBatchYAMLPaths: turns += featurespec.LoadTurns(path, opts) with error propagation
      # How: Cross-IMPL — IMPL-GOAGENT-CHECKLIST ([ARCH-GOAGENT-YAML-STEPS] [REQ-GOAGENT-YAML-STEP-RENDER]): LoadTurns when lead checklist path set; opts include StepFromID StepToID from in.LeadChecklistStepFromID in.LeadChecklistStepToID ([REQ-GOAGENT-CLI-CONFIG]).
      if in.LeadChecklistYAML non-empty: turns += checklist.LoadTurns(in.LeadChecklistYAML, opts) with error propagation
      # How: Error if no prompts — matches config/pipeline validation.
      if len(turns)==0: return error no prompts
      # [IMPL-GOAGENT-PIPELINE] [ARCH-GOAGENT-PIPELINE] [REQ-GOAGENT-PIPELINE-CHAIN]
      # How: ReadPromptFilePreload and ApplyPromptFilePreload in this package; ChainBetween derives resume edges; SessionForTurn maps initial CLI session and running session id.
      return turns
  detail_file: implementation-decisions/IMPL-GOAGENT-PIPELINE.yaml
