    - REQ-LEAP_PROPOSAL_QUEUE
  rationale:
    why: Implements ARCH-LEAP_PROPOSAL_QUEUE and REQ-LEAP_PROPOSAL_QUEUE with a testable module and MCP tools that never write project TIED YAML from the queue lifecycle.
    problems_solved:
      - No machine-readable staging for inferred LEAP hints before canonical updates
    benefits:
      - Stable ids, audit trail, opt-in extraction, thin MCP handlers with safe JSON error envelope
  implementation_approach:
    summary: leap-proposal-queue.ts (queue, audit, diff/session helpers); tools/index.ts tied_leap_proposal_*; safeLeapCall wraps sync throws
    details:
      - 'Paths: {projectRoot}/leap-proposals/queue.json and audit-log.jsonl'
      - 'extractDiffProposalCandidates: git diff + lines; failure returns { error } without throw'
      - MCP handlers use safeLeapCall for fs/git throws
      - 'S11 Phase H: no E2E-only UI surface; composition tests (leap-proposal-mcp.test.ts) authoritative for MCP bindings'
      - 'S12 Phase I: full suite + tsc + scoped tied_validate_consistency pseudocode slice clean; module validation documented in s12_phase_i'
