  code_locations:
    files:
      - path: mcp-server/src/analysis/leap-proposal-queue.ts
        description: Queue, audit, extractDiffProposalCandidates, parseSessionExportSegments [REQ-LEAP_PROPOSAL_QUEUE] [ARCH-LEAP_PROPOSAL_QUEUE] [IMPL-MCP_LEAP_PROPOSAL_QUEUE]
      - path: mcp-server/src/analysis/leap-proposal-queue.test.ts
        description: Unit tests for queue and session parsing
      - path: mcp-server/src/tools/index.ts
        description: tied_leap_proposal_* handlers and safeLeapCall
      - path: mcp-server/src/tools/leap-proposal-mcp.test.ts
        description: Composition tests — MCP handler wiring to leap-proposal-queue (no UI) [REQ-LEAP_PROPOSAL_QUEUE] [ARCH-LEAP_PROPOSAL_QUEUE] [IMPL-MCP_LEAP_PROPOSAL_QUEUE]
    functions:
      - name: loadQueue
        file: mcp-server/src/analysis/leap-proposal-queue.ts
        description: Read queue.json or empty default; DIAGNOSTIC on parse failure
      - name: extractDiffProposalCandidates
        file: mcp-server/src/analysis/leap-proposal-queue.ts
        description: Deterministic git + line scan; outer catch returns error field
