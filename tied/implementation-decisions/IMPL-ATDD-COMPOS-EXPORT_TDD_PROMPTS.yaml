IMPL-ATDD-COMPOS-EXPORT_TDD_PROMPTS:
  name: Export TddLoopPrompts step entries to markdown files
  status: Active
  cross_references:
    - ARCH-ATDD-COMPOS-DELEGATE_TO_TDD_LOOP_PROMPTS
    - REQ-ATDD-COMPOS-EXPORT_TDD_PROMPTS_STEPS
  decision: For each step entry from step_entries_from_yaml, write one sanitized-id.md under the output directory with the formatted message body.
  rationale:
    why: Optional export path materializes one file per YAML step for workflows that do not use --tdd-yaml
    problems_solved:
      - Review and version per-step markdown outside the runner
    benefits:
      - Same step_entries_from_yaml as composition layer
    upstream_note: lib/atdd_export_tdd_prompts.rb; tools/agent-stream/export_tdd_prompts.rb
  implementation_approach:
    summary: AtddExportTddPrompts.export_from_yaml uses step_entries_from_yaml and writes one file per entry
    details:
      - 'Entry point: ruby tools/agent-stream/export_tdd_prompts.rb [yaml] [out_dir]'
  code_locations:
    files:
      - path: tools/agent-stream/lib/atdd_export_tdd_prompts.rb
        description: Export pipeline [REQ-ATDD-COMPOS-EXPORT_TDD_PROMPTS_STEPS]
