IMPL-TIED_FILES:
  name: TIED File Creation
  status: Active
  cross_references:
    - ARCH-TIED_STRUCTURE
    - REQ-TIED_SETUP
  rationale:
    why: Implements ARCH-TIED_STRUCTURE and realizes REQ-TIED_SETUP by creating the foundational TIED directory structure and files
    problems_solved:
      - Manual setup of TIED structure is error-prone
      - Inconsistent project structure across implementations
      - Missing required TIED files and directories
    benefits:
      - Automated, consistent TIED setup
      - All required files and directories created correctly
      - Easy project bootstrapping with single command
  implementation_approach:
    summary: Bootstrap script that creates tied/ directory, copies template files, sets up base files, and installs the tied-yaml CLI skill under .cursor/skills/tied-yaml/
    details:
      - Create tied/ directory at project root
      - Copy YAML index files from templates (requirements.yaml, architecture-decisions.yaml, implementation-decisions.yaml, semantic-tokens.yaml)
      - Copy guide .md files, detail-files-schema.md, preload contract templates, and reference docs from TIED source tied/docs/ into client tied/docs/ when missing (per DOCS_TO_COPY in copy_files.sh)
      - Create detail subdirectories (requirements/, architecture-decisions/, implementation-decisions/)
      - Copy base files to project root when missing (.cursorrules, AGENTS.md). In a TIED source repository, live guide content is under tied/docs/; agents and preload use client ./tied/docs/ paths and ./tied/agent-preload-contract.yaml.
      - Install the tied-yaml Cursor skill to .cursor/skills/tied-yaml/ (from the TIED repo’s .cursor/skills/tied-yaml when complete, else from tools/bundled-tied-yaml-skill/; overwritten each run). The canonical stdio client is .cursor/skills/tied-yaml/scripts/tied-cli.sh only; copy_files.sh does not create a project-root scripts/tied-cli.sh entry.
  code_locations:
    files:
      - path: copy_files.sh
        description: Bootstrap script that sets up TIED structure
        lines:
          - 1
          - 386
    functions:
      - name: setup_tied_structure
        file: copy_files.sh
        description: Creates directories and copies template files (if implemented as function)
