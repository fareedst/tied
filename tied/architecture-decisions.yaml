ARCH-CONFIG_DISCOVERY_LAYERING:
  name: Layered configuration discovery with local replacement of built-ins
  status: Active
  cross_references:
    - REQ-CONFIG_DISCOVERY_LOCAL_LAYER
  rationale:
    why: Project-local configuration must be able to replace built-in defaults without silent merge; partial files must not inject defaults for omitted keys; directory excludes must match at depth.
    problems_solved:
      - Implicit default merge with local policy
      - Phantom defaults in merge from defaults-seeded parse
      - Root-only directory pattern matching
    benefits:
      - Predictable layering and operator control
      - Consistent tree-wide exclusion semantics
  alternatives_considered:
    - name: Always merge with built-ins
      pros:
        - Defaults always active
      cons:
        - Cannot narrow lists without extra syntax
      rejected_reason: Conflicts with REQ-CONFIG_DISCOVERY_LOCAL_LAYER
    - name: Replace only with explicit prefix
      pros:
        - Very explicit
      cons:
        - Poor first-file ergonomics
      rejected_reason: REQ allows unprefixed first-local replacement for selected fields
  implementation_approach:
