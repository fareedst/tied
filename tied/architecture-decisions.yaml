  status: Active
  cross_references:
    - REQ-ATDD-E2E-AGENT_STREAM
    - REQ-GOAGENT-AGENT-EXECUTOR
  rationale:
    why: The agent binary is an external CLI; Open3 provides stdout line streaming and stderr forwarding suitable for NDJSON
    problems_solved:
      - Cannot embed stream-json in-process
    benefits:
      - Testable with PATH stub; mirrors real Cursor agent usage
    upstream_note: Imported from atdd commit eb88236290009b78eb11ea561816f0854176bf12
  alternatives_considered:
    - name: HTTP API client
      pros:
        - In-process
      cons:
        - Not how Cursor agent CLI works
      rejected_reason: Requirements target the official agent subprocess
  implementation_approach:
    summary: Open3.popen3 with line-wise JSON parse; extract assistant/thinking text; capture session_id
    details:
