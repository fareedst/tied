ARCH-TREEGREP_GIT_COMMIT_RANGE_SCOPE_TEXT_MATCH:
  name: Git commit range scope (architecture)
  status: Active
  cross_references:
    requirements:
      - REQ-TREEGREP_GIT_COMMIT_RANGE_SCOPE_TEXT_MATCH
    implementation:
      - IMPL-TREEGREP_GIT_COMMIT_RANGE_SCOPE_TEXT_MATCH
      - IMPL-TREEGREP_GIT_TRACKED_SCOPE_TEXT_MATCH
  rationale: 'git log --pretty=format: --name-status with the user-supplied revision range aggregates paths across commits in that range (name-status lines feed GIT_COMMIT_PATHS_SET_FROM_NAME_STATUS_OUTPUT for include_deleted/include_renamed) without attributing paths to individual commits.'
  constraints:
    - Paths repo-relative from git output; same toplevel resolution as other git_scope modes
    - commit_range must be supplied at API boundary when scope is :commit_range
  alternatives_considered:
    - option: git diff --name-only A B
      rejected_because: Endpoint diff can omit or conflate paths relative to the union of per-commit touches required by the requirement
