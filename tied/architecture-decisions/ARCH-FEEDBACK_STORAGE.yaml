ARCH-TREEGREP_GIT_UNTRACKED_SCOPE_TEXT_MATCH:
  name: Git untracked scope (architecture)
  status: Active
  cross_references:
    requirements:
      - REQ-TREEGREP_GIT_UNTRACKED_SCOPE_TEXT_MATCH
    implementation:
      - IMPL-TREEGREP_GIT_UNTRACKED_SCOPE_TEXT_MATCH
      - IMPL-TREEGREP_GIT_TRACKED_SCOPE_TEXT_MATCH
  rationale: Untracked eligibility matches Git's ls-files --others --exclude-standard so ignored files stay out without treegrep interpreting .gitignore itself.
  constraints:
    - Same work-tree resolution as tracked scope (rev-parse)
    - Membership in untracked set from one git invocation at traversal start
  alternatives_considered:
    - option: Per-file git check-ignore
      rejected_because: Bulk ls-files --others --exclude-standard is fewer subprocesses and matches Git's definition
