ARCH-TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH:
  name: Smart-case content literal substring policy
  status: Active
  cross_references:
    - REQ-TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
    - IMPL-TREEGREP_CONTENT_TEXT_MATCH
    - ARCH-TREEGREP_CONTENT_TEXT_MATCH
    - ARCH-TREEGREP_CONTENT_CASE_SENSITIVE_TEXT_MATCH
    - ARCH-TREEGREP_CONTENT_CASE_INSENSITIVE_TEXT_MATCH
    - ARCH-TREEGREP_CONTENT_MAX_FILE_SIZE_TEXT_MATCH
  rationale:
    why: Single entry point matches_in_file gains smart_case keyword; effective sensitivity derived from query without separate scanners.
    problems_solved:
      - Avoid duplicating line-scan logic for a third mode
    benefits:
      - One module; reuses sensitive and insensitive branches already defined
  alternatives_considered:
    - name: Separate SmartContentTextMatch module
      pros:
        - Isolation
      cons:
        - Duplicated File.foreach and hit emission
      rejected_reason: Keep ContentTextMatch as single scanner
  implementation_approach:
    summary: 'matches_in_file(path, q, smart_case: true) ignores case_sensitive; if q matches /[[:upper:]]/ use line.include?(q); else line.downcase.include?(q.downcase). Hit :line is always original L. Locale tailoring out of scope.'
    details:
      - Same hit shape as other content modes; context lines out of scope
      - lib/treegrep/content_text_match.rb
  traceability:
    requirements:
      - REQ-TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
    implementation:
      - IMPL-TREEGREP_CONTENT_TEXT_MATCH
    tests:
      - test_token_smart_matches_Token_line_REQ_TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
      - test_TOken_smart_does_not_match_Token_line_REQ_TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
      - test_tok3n_smart_matches_Tok3n_line_when_no_upper_in_query_REQ_TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
      - test_Tok3n_smart_requires_matching_case_REQ_TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
      - test_smart_case_true_ignores_case_sensitive_true_for_lowercase_query_REQ_TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
      - test_smart_case_true_ignores_case_sensitive_false_when_query_has_upper_REQ_TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
      - test_traverse_Token_line_smart_token_vs_TOken_REQ_TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
    code_annotations:
      - ARCH-TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
      - IMPL-TREEGREP_CONTENT_TEXT_MATCH
      - REQ-TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
  related_decisions:
    depends_on:
      - REQ-TREEGREP_CONTENT_SMART_CASE_TEXT_MATCH
    informs:
