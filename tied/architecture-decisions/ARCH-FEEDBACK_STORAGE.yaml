ARCH-TREEGREP_COUNT_ONLY_TEXT_MATCH:
  name: 'Architecture: count-only text output'
  status: Active
  decision: SearchRoot.count_matching_paths_after_validating_queries wraps each_matching_path_after_validating_queries (same kwargs including max_results) and returns Integer. SearchRun.format_text_search_output with count_only true formats only match_count (singular/plural grammar); listing_lines ignored.
  cross_references:
    - REQ-TREEGREP_COUNT_ONLY_TEXT_MATCH
    - IMPL-TREEGREP_NAME_OR_CONTENT_QUERY_TEXT_MATCH
  alternatives_considered:
    - option: Count inside traverse without PATH_MATCHES_SEARCH_RUN
      rejected_because: Would diverge from match semantics
  detail_file: architecture-decisions/ARCH-TREEGREP_COUNT_ONLY_TEXT_MATCH.yaml
  rationale:
    why: Count-only must reuse the same validated traversal and PATH_MATCHES_SEARCH_RUN semantics as full listing so cardinality equals what a listing run would include (subject to max_results).
    problems_solved:
      - Duplicate counting logic diverging from match rules
      - Streaming large path lists when only a total is needed
    benefits:
      - Single pipeline for count and list
      - Plain-text UX can show one summary line
  implementation_approach:
    summary: Integer count via wrapping each_matching_path_after_validating_queries; text formatting via SearchRun.format_text_search_output when count_only is true.
    details:
      - SearchRoot.count_matching_paths_after_validating_queries increments on each yield from each_matching_path_after_validating_queries with identical kwargs (including max_results cap).
      - 'SearchRun.format_text_search_output(count_only: true) emits match_count with singular/plural grammar and ignores listing_lines.'
  traceability:
    tests:
      - test_count_only_output_three_no_paths_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
      - test_count_only_zero_matches_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
      - test_count_matches_each_matching_enumeration_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
      - test_count_matching_paths_forwards_max_results_to_each_matching_after_validating_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
      - test_format_count_only_one_match_grammar_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
      - test_format_count_only_three_matches_plural_word_REQ_TREEGREP_COUNT_ONLY_TEXT_MATCH
  related_decisions:
    depends_on:
      - REQ-TREEGREP_COUNT_ONLY_TEXT_MATCH
    informs:
      - IMPL-TREEGREP_NAME_OR_CONTENT_QUERY_TEXT_MATCH
    see_also:
      - ARCH-TREEGREP_NAME_OR_CONTENT_QUERY_TEXT_MATCH
      - ARCH-TREEGREP_MAX_RESULTS_TEXT_MATCH
  metadata:
