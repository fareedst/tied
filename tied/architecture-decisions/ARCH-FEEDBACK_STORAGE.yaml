ARCH-TREEGREP_GIT_COMMIT_BASED_SCOPE_PATH_AND_CONTENT_ELIGIBILITY:
  name: Commit-based scope path and content eligibility (architecture aggregate)
  status: Active
  cross_references:
    requirements:
      - REQ-TREEGREP_GIT_COMMIT_BASED_SCOPE_PATH_AND_CONTENT_ELIGIBILITY
    implementation:
      - IMPL-TREEGREP_GIT_TRACKED_SCOPE_TEXT_MATCH
      - IMPL-TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
      - IMPL-TREEGREP_GIT_COMMIT_SCOPES_INCLUDE_RENAMED_DEFAULT_TEXT_MATCH
      - IMPL-TREEGREP_GIT_COMMIT_SCOPES_INCLUDE_DELETED_PATH_MATCH_TEXT_MATCH
      - IMPL-TREEGREP_GIT_COMMIT_SCOPES_WORKING_TREE_CONTENT_TEXT_MATCH
      - IMPL-TREEGREP_GIT_SPECIFIC_COMMIT_SNAPSHOT_CONTENT_TEXT_MATCH
      - IMPL-TREEGREP_GIT_COMMIT_RANGE_COMMIT_SNAPSHOT_UNSUPPORTED_TEXT_MATCH
      - IMPL-TREEGREP_GIT_SPECIFIC_COMMIT_SCOPE_TEXT_MATCH
      - IMPL-TREEGREP_GIT_COMMIT_RANGE_SCOPE_TEXT_MATCH
  decision: 'Commit-based git_scope (:specific_commit, :commit_range) composes three layers: (1) SearchRun validates scope parameters and optional include_deleted, include_renamed, and history_content_source for commit scopes; (2) SearchRoot builds eligible path sets from git name-status (diff-tree or git log) and optionally yields paths missing from the worktree so path-only queries can see deleted or rename-source names; (3) SearchMatch routes content reads to the working tree or to a single-commit blob snapshot via git cat-file, and rejects commit_snapshot for commit_range at validation time. Granular ARCH records define each layer; this aggregate ties them to REQ-TREEGREP_GIT_COMMIT_BASED_SCOPE_PATH_AND_CONTENT_ELIGIBILITY.'
  rationale: A single architectural view of prompt slice 53 avoids duplicating git subprocess and match-pipeline decisions while preserving modular ARCH/IMPL decomposition for each concern.
  constraints:
    - 'Path eligibility and content source are orthogonal: eligibility is a set of repo-relative strings; content mode decides file read vs blob read vs skip when no file exists.'
    - commit_snapshot content is defined only for a single resolved commit, not for an arbitrary range.
  alternatives_considered:
    - option: One monolithic git_scope implementation without fragment ARCHs
      rejected_because: Existing fragment ARCHs already isolate diff-tree vs log, name-status parsing, and history transport; aggregate documents composition only.
  related_decisions:
    depends_on: []
    informs: []
    see_also:
      - ARCH-TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
      - ARCH-TREEGREP_GIT_COMMIT_SCOPES_INCLUDE_RENAMED_DEFAULT_TEXT_MATCH
      - ARCH-TREEGREP_GIT_COMMIT_SCOPES_INCLUDE_DELETED_PATH_MATCH_TEXT_MATCH
      - ARCH-TREEGREP_GIT_COMMIT_SCOPES_WORKING_TREE_CONTENT_TEXT_MATCH
      - ARCH-TREEGREP_GIT_SPECIFIC_COMMIT_SNAPSHOT_CONTENT_TEXT_MATCH
      - ARCH-TREEGREP_GIT_COMMIT_RANGE_COMMIT_SNAPSHOT_UNSUPPORTED_TEXT_MATCH
      - ARCH-TREEGREP_GIT_SPECIFIC_COMMIT_SCOPE_TEXT_MATCH
      - ARCH-TREEGREP_GIT_COMMIT_RANGE_SCOPE_TEXT_MATCH
      - ARCH-TREEGREP_GIT_TRACKED_SCOPE_TEXT_MATCH
  traceability:
    requirements:
      - REQ-TREEGREP_GIT_COMMIT_BASED_SCOPE_PATH_AND_CONTENT_ELIGIBILITY
    implementation:
      - IMPL-TREEGREP_GIT_TRACKED_SCOPE_TEXT_MATCH
      - IMPL-TREEGREP_GIT_COMMIT_SCOPES_EXCLUDE_DELETED_DEFAULT_TEXT_MATCH
      - IMPL-TREEGREP_GIT_COMMIT_SCOPES_INCLUDE_RENAMED_DEFAULT_TEXT_MATCH
