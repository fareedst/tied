  cross_references:
    requirements:
      - REQ-TREEGREP_DATE_ONLY_TIME_BOUND
    implementation:
      - IMPL-TREEGREP_DATE_ONLY_TIME_BOUND
  rationale: Users expect a bare calendar date to mean the whole local day for both lower and upper bounds ([REQ-TREEGREP_DATE_ONLY_TIME_BOUND] examples 1–2). Failing fast on bad strings avoids partial traversals and matches CLI/library error expectations.
  constraints:
