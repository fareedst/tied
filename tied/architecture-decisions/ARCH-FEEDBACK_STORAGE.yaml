    - Explicit time-zone offset or IANA zone rules in input strings remain out of scope.
    - The same coercion feeds modified-time and created-time bound helpers (shared IMPL).
  decision: 'Coerce date-only after_time and before_time to closed local-calendar-day instants in Treegrep::SearchRoot: :lower uses local 00:00:00; :upper uses local end of that day (23:59:59 with last representable subsecond). Date and date-shaped strings use Date.parse then the same mapping; full Time and #to_time values are exact instants. Unparseable or invalid calendar dates raise InvalidTimeBoundError before any directory walk.'
