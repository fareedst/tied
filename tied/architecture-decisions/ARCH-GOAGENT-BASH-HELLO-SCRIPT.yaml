ARCH-GOAGENT-BASH-HELLO-SCRIPT:
  name: Root Bash smoke script for agent validation
  status: Active
  cross_references:
    - REQ-GOAGENT-BASH-HELLO-SCRIPT
  decision: |
    The project or workspace SHALL expose a single-purpose Bash script at its root (conventional names hello_world.sh or hello.sh; one script, one contract) that uses env bash, enables strict options (set -euo pipefail), writes exactly one line "Hello World!" to stdout with a trailing newline, and exits zero on success. The script SHALL NOT be part of the Go module graph when a Go tree exists; it remains a POSIX shell artifact for pipelines, LEAD+TIED checklist runs, and agent smoke checks.
  rationale:
    why: Checklists and agent harnesses need a deterministic, dependency-free executable to verify shell and cwd without building Go or Ruby.
    problems_solved:
      - No shared contract for a trivial validation script alongside agentstream tooling
    benefits:
      - One-line observable behavior; easy to assert in any test runner or manual run
  alternatives_considered:
    - name: Require only Go or Ruby smoke entrypoints
      pros:
        - Reuses existing test stacks
      cons:
        - Requires compile or bundle for minimal validation
      rejected_reason: REQ calls for Bash-only smoke at repo root
  implementation_approach:
    summary: One file at project or workspace root (hello_world.sh or hello.sh per convention); no imports; documented path and invocation in IMPL code_locations.
    details:
      - Pipelines and checklist steps invoke via bash or execute bit per platform convention
      - Client workspaces that only ship hello.sh satisfy the same architectural contract as hello_world.sh
  traceability:
    requirements:
      - REQ-GOAGENT-BASH-HELLO-SCRIPT
    implementation:
      - IMPL-GOAGENT-BASH-HELLO-SCRIPT
    tests:
      - hello_world_script_entry_test.go TestSCRIPT_ENTRY_OUTPUT_exactly_one_line_REQ_GOAGENT_BASH_HELLO_SCRIPT
      - hello_world_script_entry_test.go TestSCRIPT_ENTRY_REQ_GOAGENT_BASH_HELLO_SCRIPT_stdout_and_exit
      - hello_world_script_entry_test.go TestRESOLVE_HELLO_SCRIPT_BASENAME_missing_REQ_GOAGENT_BASH_HELLO_SCRIPT
      - hello_world_script_entry_test.go TestUNIT_TEST_SCRIPT_ENTRY_bash_nonzero_REQ_GOAGENT_BASH_HELLO_SCRIPT
      - hello_world_script_entry_test.go TestCOMPOSE_RunScriptEntrySmokeFromRoot_REQ_GOAGENT_BASH_HELLO_SCRIPT
    code_annotations:
      - ARCH-GOAGENT-BASH-HELLO-SCRIPT
  related_decisions:
    depends_on:
      - ARCH-TIED_STRUCTURE
    informs: []
    see_also:
      - ARCH-GOAGENT-EXECUTOR
