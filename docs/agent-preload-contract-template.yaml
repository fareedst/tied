# Agent preload contract — generic template
#
# When the workspace is the TIED source repository (indexes at repo root; methodology guides under tied/),
# prefer docs/agent-preload-contract-tied-repo.yaml instead of this file.
#
# Applicability: A blank or generic copy of this file is not a substitute for a
# REQ+ARCH-bounded system definition. Prefer not to treat agent_preload as
# authoritative for stack, paths, or tests until after architecture decisions
# exist; then update workspace-root agent-preload-contract.yaml after
# author-architecture (ARCH-locked constants) and again after
# persist-implementation-records (IMPL-locked code_locations and related fields)
# per tied/docs/agent-req-implementation-checklist.yaml. sync-tied-stack re-checks
# preload if TIED status or traceability to tests changed.
#
# If a field is present and true, the agent should treat it as authoritative
# and avoid redundant tool calls unless a later result contradicts it.
#
# Copy this file per session or per workspace and fill values.
agent_preload:
  workspace:
    cwd: "" # absolute path; must match session workspace_roots[0] when set
    project_summary: ""
    top_level_entries: [] # optional; omit if likely to go stale
    vcs_present: false # e.g. true when .git exists
  session_bootstrap_docs:
    ai_principles_path: ./tied/docs/ai-principles.md
    semantic_tokens_index: ./tied/semantic-tokens.yaml
    semantic_tokens_guide: ./tied/semantic-tokens.md
    architecture_decisions_index: ./tied/architecture-decisions.yaml
    implementation_decisions_index: ./tied/implementation-decisions.yaml
    implementation_decisions_guide: ./tied/implementation-decisions.md
    # Client live file; TIED copy_files.sh seeds it from templates/processes.md when missing
    processes_path: ./tied/processes.md
    agent_req_checklist_path: ./tied/docs/agent-req-implementation-checklist.md
    detail_files_schema: ./tied/detail-files-schema.md
    requirements_index: ./tied/requirements.yaml
  methodology_vs_project:
    methodology_readonly: true # tied/methodology/** not edited in client
    project_tokens_only_writable: true
  implementation_contract:
    language: ""
    language_version: ""
    test_framework: ""
    test_cohabit_code: false
    invalid_input: "" # e.g. exception, nil, documented behavior
    target_source_paths: []
    citdp_artifact_paths: []
  tied_mcp:
    base_path_resolved: false # if true, skip tied_config_get_base_path unless cwd changed
    yaml_detail_batch_done: false # if true, skip yaml_detail_read_many for same keys
    tied_cli_stdio_ok_without_cursor_mcp: false # true when Node + built server (e.g. TIED_MCP_BIN to dist/index.js): tied-cli.sh works over stdio; empty IDE MCP server list does not mean tied-cli is unavailable
  # Paths below are relative to TIED_BASE_PATH unless noted. Match MCP env TIED_BASE_PATH.
  tied_paths:
    TIED_BASE_PATH: "" # e.g. tied or absolute path to .../project/tied
    project_yaml_writable_globs:
      - '*.yaml' # index + feedback at base: requirements, architecture-decisions, implementation-decisions, semantic-tokens, feedback
      - requirements/*.yaml
      - architecture-decisions/*.yaml
      - implementation-decisions/*.yaml
    methodology_readonly_glob: methodology/** # never agent-write; refreshed by copy_files.sh
    mcp_tied_yaml_verified_this_session: false # set true after a successful MCP read/write this session
  discovery_already_done:
    ruby_files_present: false
    ruby_test_files_present: false
    gemfile_present: false
    semantic_tokens_present: false
    grep_patterns_satisfied:
      token_scan_in_sources: false # REQ|ARCH|IMPL across rb/md/yaml
      repo_layout_scan: false # **/* or equivalent
  active_user_intent:
    primary_query_summary: ""
    checklist_token: "" # e.g. PROC-AGENT_REQ_CHECKLIST
    checklist_step_id: "" # e.g. session-bootstrap
# Instruction block for prompts (optional; paste near agent_preload in user rules)
preload_instructions: |
  Treat agent_preload as authoritative context. If a value is present, do not spend
  tool calls rediscovering it unless a later tool result or user message contradicts it.
  Prefer preload facts over filesystem discovery. Do not search for MCP schema, server
  metadata, `.cursor/mcp.json`, or pause to confirm MCP unavailability — especially when
  the session is driven by Go tools/agentstream (MCP preflight there is optional; copy_files.sh
  installs `.cursor/skills/tied-yaml/` only). Lack of Cursor MCP tools does not block tied-cli.sh
  when Node and TIED_MCP_BIN (built mcp-server/dist/index.js) are available — see tied-yaml SKILL.md. Do not search project layout or target file
  existence unless needed to resolve a contradiction. When tied_paths.TIED_BASE_PATH and
  project_yaml_writable_globs are set,
  align MCP TIED_BASE_PATH with them; never treat methodology_readonly_glob paths as
  writable. Keep preload narrow and accurate; wrong preload costs more than one
  discovery call.
