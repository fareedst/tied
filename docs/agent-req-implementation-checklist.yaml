# Agent Requirement Implementation Checklist (executable YAML)
#
# HIGHEST PRIORITY: This file MUST be copied to a unique file for each request in a working folder.
# Keep all such copies in that working folder. Do not track completion or run the checklist against
# the canonical file in docs/; use the per-request copy. File name MUST include (1) the REQ semantic
# token for the requirement (e.g. REQ-DATA_SAVE) and (2) a sortable timestamp value (e.g. ISO8601
# compact YYYYMMDDHHMMSS or seconds since epoch). Example: <working_folder>/REQ-DATA_SAVE_20260316120000.yaml
# or <working_folder>/REQ-DATA_SAVE_1710619200.yaml. Create the working folder if it does not exist.
#
# Source: docs/agent-req-implementation-checklist.md
# Process token: [PROC-AGENT_REQ_CHECKLIST]
# Each step is atomic (repeatable/skippable). Tracking supports completion gates and retry state.
#
# Step completion comments (above each item in steps and sub_procedures):
#   Not completed:  # id <STEP_ID> time   (space after "time" is where seconds-in-epoch will be written)
#   Completed:      # id <STEP_ID> time <seconds-in-epoch>
#
# Record completion time (id=step id, val=seconds since epoch, file=this YAML path):
#   BSD/macOS:  sed -i '' "s/^  # id $id time$/& $val/" "$file"
#   POSIX:      sed "s/^  # id $id time$/& $val/" "$file" > "$file.tmp" && mv "$file.tmp" "$file"
#
# Clear completion for loop-back: use loop_back_clearance.<target>.clear_ids; reset each listed id
# so the comment is "  # id <ID> time" (no epoch). Commands (id=step id, file=this YAML path):
#   BSD/macOS:  sed -i '' "s/^  # id $id time [0-9][0-9]*$/  # id $id time/" "$file"
#   POSIX:      sed "s/^  # id $id time [0-9][0-9]*$/  # id $id time/" "$file" > "$file.tmp" && mv "$file.tmp" "$file"
# Example: clear all IDs for target S06.1 (loop over clear_ids for S06.1):
#   for id in S06.1 S06.2 S06.3 S06.4 S06.5 S06.5a S06.6 S07 S08 S09.RED S09.GREEN S09.REFACTOR S09.SYNC S10 S11 S12 S13; do
#     sed -i '' "s/^  # id $id time [0-9][0-9]*$/  # id $id time/" "$file"   # BSD/macOS
#   done
name: agent_req_implementation_checklist
description: |
  Primary procedural template for every new requirement or change to the tested system. Unifies CITDP, TIED dev cycle, IMPL_CODE_TEST_SYNC, LEAP, YAML edit loop, and related processes. Mandatory order: IMPL pseudo-code (token-commented) -> RED tests -> code.
source_document: docs/agent-req-implementation-checklist.md
process_token: '[PROC-AGENT_REQ_CHECKLIST]'
version: 1.0.1
last_updated: "2026-03-21"
# Absolute paths below use this workspace root. For a per-request copy in another project, replace
# every occurrence of /Users/fareed/Documents/dev/chatgpt/stdd with that project's absolute root
# (including CITDP_RECORDS). WORKSPACE_ROOT and CITDP_RECORDS must be the client project—the repo
# whose project tied/ you edit—not a separate TIED methodology repo unless that is the workspace.
workspace_paths:
  WORKSPACE_ROOT: /Users/fareed/Documents/dev/chatgpt/stdd
  TIED_BASE: /Users/fareed/Documents/dev/chatgpt/stdd/tied
  TIED_DOCS: /Users/fareed/Documents/dev/chatgpt/stdd/tied/docs
  REPO_DOCS: /Users/fareed/Documents/dev/chatgpt/stdd/docs
  CITDP_RECORDS: /Users/fareed/Documents/dev/chatgpt/stdd/docs/citdp
processes_unified:
  - '[PROC-CITDP]'
  - '[PROC-TIED_DEV_CYCLE]'
  - '[PROC-IMPL_CODE_TEST_SYNC]'
  - '[PROC-LEAP]'
  - '[PROC-YAML_EDIT_LOOP]'
  - '[PROC-IMPL_PSEUDOCODE_TOKENS]'
  - '[PROC-PSEUDOCODE_VALIDATION]'
  - '[PROC-TOKEN_AUDIT]'
  - '[PROC-TOKEN_VALIDATION]'
  - '[PROC-TEST_STRATEGY]'
  - '[PROC-COMMIT_MESSAGES]'
entry_points:
  - scenario: New requirement
    start_at: S01
    notes: Full checklist applies
  - scenario: Change to existing system
    start_at: S01
    notes: CITDP analysis applies at S02-S03; existing tokens loaded at S03
  - scenario: TIED prepared; tests/code not updated
    start_at: S01
    notes: S04-S06 verify-only; use updated REQ/ARCH/IMPL as source of truth; follow [PROC-TIED_FIRST_IMPLEMENTATION]
  - scenario: Bug fix
    start_at: S01
    notes: At S02, determine if a REQ is missing; if so, create REQ at S04 before defining the fix
flow_control_notation:
  - symbol: GOTO Sxx
    meaning: Jump to step Sxx; resume from there
  - symbol: IF condition THEN action
    meaning: Conditional branch
  - symbol: LOOP ... UNTIL condition
    meaning: Repeat enclosed steps until condition is met
  - symbol: CALL SUB-xxx
    meaning: Invoke sub-procedure; return to the calling step when done
  - symbol: RETURN
    meaning: Return from a sub-procedure to the caller
  - symbol: EXIT
    meaning: Checklist complete
# Loop-backs: for each GOTO target, clear these step IDs so all steps are available for the new pass.
# When re-entering a step, reset completion comments (id STEP time) for every ID listed under that target.
