steps:
  # id S01 time
  - id: S01
    title: Session Bootstrap
    goals: Confirm access to all governing TIED documents; understand current project state and priorities.
    tasks:
      - Preface the response with "Observing AI principles!".
      - 'Read completely: /Users/fareed/Documents/dev/chatgpt/stdd/ai-principles.md'
      - 'Review token registry: /Users/fareed/Documents/dev/chatgpt/stdd/tied/semantic-tokens.yaml and guide: /Users/fareed/Documents/dev/chatgpt/stdd/tied/semantic-tokens.md'
      - 'Review YAML indexes: /Users/fareed/Documents/dev/chatgpt/stdd/tied/architecture-decisions.yaml and /Users/fareed/Documents/dev/chatgpt/stdd/tied/implementation-decisions.yaml'
      - 'Review IMPL schema and pseudo-code rules: /Users/fareed/Documents/dev/chatgpt/stdd/tied/implementation-decisions.md ([PROC-IMPL_PSEUDOCODE_TOKENS]).'
      - Confirm tied-yaml MCP server availability; call MCP tied_config_get_base_path and align env TIED_BASE_PATH with /Users/fareed/Documents/dev/chatgpt/stdd/tied (or the active project equivalent when using a copied checklist).
      - For every create/update/delete under project TIED YAML (/Users/fareed/Documents/dev/chatgpt/stdd/tied/*.yaml and /Users/fareed/Documents/dev/chatgpt/stdd/tied/requirements|architecture-decisions|implementation-decisions/*.yaml, excluding methodology/**), use tied-yaml MCP tools per /Users/fareed/Documents/dev/chatgpt/stdd/docs/yaml-update-mcp-runbook.md (also at /Users/fareed/Documents/dev/chatgpt/stdd/tied/docs/yaml-update-mcp-runbook.md after copy_files). Do not use IDE apply_patch/Write on those paths when an MCP tool exists; on MCP error, follow the runbook failure playbook (retry/fix args; do not silently fall back to direct file edit).
      - 'Understand priority order: Tests > Code > Basic Functions > Developer Experience > Infrastructure > Security.'
    outcomes: Agent has read all governing documents. Session context is established.
    references:
      - /Users/fareed/Documents/dev/chatgpt/stdd/AGENTS.md § 1-2
      - /Users/fareed/Documents/dev/chatgpt/stdd/ai-principles.md § Mandatory Acknowledgment, § Checklist for AI Agents
      - /Users/fareed/Documents/dev/chatgpt/stdd/docs/yaml-update-mcp-runbook.md
      - /Users/fareed/Documents/dev/chatgpt/stdd/docs/ai-agent-tied-mcp-usage.md
    flow:
      next: S02
      branches: []
      calls: []
    tracking:
      status: pending
      consideration_before_proceeding: All governing documents read; session context established; priority order understood.
      retry_count: 0
      returned_from: []
      state_history: []
  # id S02 time
  - id: S02
    title: Define Change or New Requirement
    goals: Articulate what is changing or being added, why, what stays the same, and measurable success criteria.
    tasks:
      - State current behavior (or "none" for a new requirement).
      - State desired behavior.
      - State unchanged behavior (explicit boundaries of what is not affected).
      - State non-goals (what this work intentionally does not address).
      - State success criteria (measurable outcomes that determine when the work is done).
    outcomes: A clear change definition exists. For CITDP records, this populates the change_definition section.
    references:
      - tied/processes.md § [PROC-CITDP] step 1
      - ai-principles.md § Bugs vs requirements
    flow:
      next: S03
      branches:
        - condition: Bug fix AND no REQ exists for the expected behavior
          action: GOTO S04 first, then return here to define the fix
          target: S04
      calls: []
    tracking:
      status: pending
      consideration_before_proceeding: Change definition documented; current, desired, unchanged, non-goals, and success criteria stated.
      retry_count: 0
      returned_from: []
      state_history: []
  # id S03 time
  - id: S03
    title: Impact Analysis and IMPL Discovery
    goals: Identify all affected modules, tokens, code, and tests; build an IMPL inventory table that serves as the working context for the rest of the checklist.
    tasks:
      - Identify affected modules and functions with their tied tokens.
      - Identify module boundaries the change touches or crosses.
      - 'Build tied_context: tied_tokens_affected, tied_tokens_new.'
      - 'IMPL Discovery A1: Load each affected IMPL detail via MCP yaml_detail_read or yaml_detail_read_many (preferred batch read); record cross_references, related_decisions (depends_on, composed_with, see_also), traceability. Resolve paths under /Users/fareed/Documents/dev/chatgpt/stdd/tied/implementation-decisions/ only after confirming tokens via MCP or index—do not assume files exist on disk before creation (Read failures are expected until S06.6).'
      - 'IMPL Discovery A2: Discover related IMPLs via (a) composed_with/depends_on, (b) shared REQ/ARCH tokens, (c) code_locations overlap, (d) [IMPL-*] in source/tests.'
      - 'IMPL Discovery A3: Build IMPL inventory table (IMPL token, Pseudo-code loaded, Code files, Test files, Testability).'
      - Stop expanding when no new IMPLs share code paths, REQ/ARCH tokens, or composed_with links with the current set.
    outcomes: Complete impact map; IMPL inventory table ready; all affected and related tokens identified.
    references:
      - tied/processes.md § [PROC-CITDP] step 2
      - tied/processes.md § [PROC-IMPL_CODE_TEST_SYNC] Phase A (A1-A3)
      - tied/docs/impl-code-test-linkage.md § Phase A — Discovery
    flow:
      next: S04
      branches:
        - condition: IMPL set is large (signal of high coupling)
          action: Consider whether IMPLs need decomposition before proceeding
          target: null
      calls: []
    tracking:
      status: pending
      consideration_before_proceeding: Impact map complete; IMPL inventory table built; expansion stopped per criteria.
      retry_count: 0
      returned_from: []
      state_history: []
  # id S04 time
  - id: S04
    title: Author/Update REQ
    goals: Create or update the requirement record so the change has a formal [REQ-*] token with full traceability fields.
    tasks:
      - Create or update the requirements index row via MCP (yaml_index_insert / yaml_index_update) or tied_token_create_with_detail on /Users/fareed/Documents/dev/chatgpt/stdd/tied/requirements.yaml — do not apply_patch the index file directly unless no MCP tool covers the operation (document one-line exception).
      - Create or update REQ detail via MCP yaml_detail_create / yaml_detail_update (prefer yaml_detail_read then small updates) at /Users/fareed/Documents/dev/chatgpt/stdd/tied/requirements/REQ-{TOKEN}.yaml per /Users/fareed/Documents/dev/chatgpt/stdd/tied/detail-files-schema.md § REQ (or /Users/fareed/Documents/dev/chatgpt/stdd/detail-files-schema.md at template root).
      - Register the REQ token in /Users/fareed/Documents/dev/chatgpt/stdd/tied/semantic-tokens.yaml via MCP yaml_index_insert / yaml_index_update on index semantic-tokens.
      - CALL SUB-YAML for each changed YAML file under /Users/fareed/Documents/dev/chatgpt/stdd/tied/ (after MCP writes; for direct-edit exceptions only, run lint_yaml on that absolute path inside SUB-YAML—never raw multi-argument `yq` pretty-print on multiple paths in one process; see processes.md [PROC-YAML_EDIT_LOOP]).
    outcomes: REQ record exists in both the index and the detail file; token is registered in semantic-tokens.yaml; all YAML validated.
    references:
      - tied/processes.md § [PROC-YAML_DB_OPERATIONS] § Appending a New Record
      - tied/detail-files-schema.md § 1
      - tied/semantic-tokens.md § Token Creation Requirements
    flow:
      next: S05
      branches: []
      calls:
        - SUB-YAML
    tracking:
      status: pending
      consideration_before_proceeding: REQ index and detail file complete; token in semantic-tokens.yaml; SUB-YAML passed for all changed files.
      retry_count: 0
      returned_from:
