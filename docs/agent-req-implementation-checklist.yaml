      - 'Sub-blocks (different token set): open with # [IMPL-...] [ARCH-...] [REQ-...] and how the sub-block implements them.'
      - 'Cross-IMPL dependency comments: when IMPL-A calls/depends on IMPL-B, calling block in IMPL-A names IMPL-B (and ARCH/REQ).'
