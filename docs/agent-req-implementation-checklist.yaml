      - Create or update ARCH detail at /Users/fareed/Documents/dev/chatgpt/stdd/tied/architecture-decisions/ARCH-{TOKEN}.yaml via MCP yaml_detail_create / yaml_detail_update per detail-files-schema § ARCH.
      - Register each new ARCH token in /Users/fareed/Documents/dev/chatgpt/stdd/tied/semantic-tokens.yaml via MCP.
      - CALL SUB-YAML for each changed YAML file under /Users/fareed/Documents/dev/chatgpt/stdd/tied/ (direct-edit exception only with one-line logged gap per /Users/fareed/Documents/dev/chatgpt/stdd/docs/yaml-update-mcp-runbook.md).
    outcomes: ARCH records exist with REQ cross-references; tokens registered; YAML validated.
    references:
