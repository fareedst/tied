# State-machine view of the full agent requirement implementation checklist.
# Derived from docs/agent-req-implementation-checklist.yaml. Canonical source remains
# the full checklist for tracking and loop-backs. Use this file for tooling and
# linear step progression; apply GOTOs from branches when following the checklist.
name: agent_req_checklist_state_machine
description: |
  Linear state-machine view of the full agent REQ implementation checklist (S01–S16). For branch behavior (GOTO S04, S05, S06.x, S09.RED, etc.) consult branches and the canonical docs/agent-req-implementation-checklist.yaml.
source_document: docs/agent-req-implementation-checklist.yaml
process_token: '[PROC-AGENT_REQ_CHECKLIST]'
version: 1.0.0
last_updated: "2026-03-18"
entry_points:
  - scenario: New requirement
    start_at: S01
    notes: Full checklist applies
  - scenario: Change to existing system
    start_at: S01
    notes: CITDP analysis at S02-S03; existing tokens loaded at S03
  - scenario: TIED prepared; tests/code not updated
    start_at: S01
    notes: S04-S06 verify-only; follow [PROC-TIED_FIRST_IMPLEMENTATION]
  - scenario: Bug fix
    start_at: S01
    notes: At S02, if no REQ for expected behavior, create REQ at S04 first
flow_control_notation:
  - symbol: GOTO Sxx
    meaning: Jump to step Sxx; resume from there
  - symbol: IF condition THEN action
    meaning: Conditional branch
  - symbol: LOOP ... UNTIL condition
    meaning: Repeat enclosed steps until condition is met
  - symbol: CALL SUB-xxx
    meaning: Invoke sub-procedure; return to the calling step when done
  - symbol: RETURN
    meaning: Return from a sub-procedure to the caller
  - symbol: EXIT
    meaning: Checklist complete
branches:
  S02:
    - condition: Bug fix AND no REQ exists for expected behavior
      target: S04
  S06.4:
    - condition: Resolution changes scope of ARCH
      target: S05
    - condition: Resolution changes scope of REQ
      target: S04
  S10:
    - condition: No IMPL covers binding and binding belongs to existing IMPL
      target: S06.5
    - condition: No IMPL covers binding and distinct design decision
      target: S06.1
  S11:
    - condition: E2E reveals missing IMPL block
      target: S06.1
  S12:
    - condition: Test failure
      target: S09.RED
  S13:
    - condition: Divergence between TIED docs and code/tests
      target: S06.4
sub_procedures:
  - id: SUB-YAML
    title: YAML Edit and Validation Loop
    invoked_by:
      - S04
      - S05
      - S06.6
      - S09.SYNC
      - S10
      - S12
      - S13
      - S15
      - SUB-LEAP-MICRO
  - id: SUB-PSEUDOCODE-VALIDATE
    title: Pseudo-Code Validation
    invoked_by:
      - S06.5a
  - id: SUB-LEAP-MICRO
    title: LEAP Micro-Cycle During TDD
    invoked_by:
      - S09.GREEN
linear_steps:
  - id: S01
    title: Session Bootstrap
    stage: bootstrap
    goals: Confirm access to all governing TIED documents; understand current project state and priorities.
    tasks:
      - Preface the response with "Observing AI principles!".
      - Read ai-principles.md completely.
      - Review tied/semantic-tokens.yaml (token registry) and tied/semantic-tokens.md (token guide).
      - Review tied/architecture-decisions.yaml and tied/implementation-decisions.yaml (YAML indexes).
      - Review tied/implementation-decisions.md (IMPL schema, pseudo-code rules, block token rules per [PROC-IMPL_PSEUDOCODE_TOKENS]).
      - Confirm TIED MCP server availability (if applicable); prefer MCP for TIED data read/write.
      - 'Understand priority order: Tests > Code > Basic Functions > Developer Experience > Infrastructure > Security.'
    outcomes: Agent has read all governing documents. Session context is established.
  - id: S02
    title: Define Change or New Requirement
    stage: citdp
    goals: Articulate what is changing or being added, why, what stays the same, and measurable success criteria.
    tasks:
      - State current behavior (or "none" for a new requirement).
      - State desired behavior.
      - State unchanged behavior (explicit boundaries of what is not affected).
      - State non-goals (what this work intentionally does not address).
      - State success criteria (measurable outcomes that determine when the work is done).
    outcomes: A clear change definition exists. For CITDP records, this populates the change_definition section.
  - id: S03
    title: Impact Analysis and IMPL Discovery
    stage: citdp
    goals: Identify all affected modules, tokens, code, and tests; build an IMPL inventory table that serves as the working context for the rest of the checklist.
    tasks:
      - Identify affected modules and functions with their tied tokens.
      - Identify module boundaries the change touches or crosses.
      - 'Build tied_context: tied_tokens_affected, tied_tokens_new.'
      - 'IMPL Discovery A1: Load each affected IMPL detail file; record cross_references, related_decisions (depends_on, composed_with, see_also), traceability.'
      - 'IMPL Discovery A2: Discover related IMPLs via (a) composed_with/depends_on, (b) shared REQ/ARCH tokens, (c) code_locations overlap, (d) [IMPL-*] in source/tests.'
      - 'IMPL Discovery A3: Build IMPL inventory table (IMPL token, Pseudo-code loaded, Code files, Test files, Testability).'
      - Stop expanding when no new IMPLs share code paths, REQ/ARCH tokens, or composed_with links with the current set.
    outcomes: Complete impact map; IMPL inventory table ready; all affected and related tokens identified.
  - id: S04
    title: Author/Update REQ
    stage: authoring
    goals: Create or update the requirement record so the change has a formal [REQ-*] token with full traceability fields.
    tasks:
      - Create or update the entry in requirements.yaml with all required fields (name, category, priority, status, rationale, satisfaction_criteria, validation_criteria, traceability, related_requirements, detail_file, metadata).
      - Create or update the REQ detail file in requirements/REQ-{TOKEN}.yaml per tied/detail-files-schema.md § REQ.
      - Register the REQ token in semantic-tokens.yaml.
      - CALL SUB-YAML for each changed YAML file.
    outcomes: REQ record exists in both the index and the detail file; token is registered in semantic-tokens.yaml; all YAML validated.
  - id: S05
    title: Author/Update ARCH
    stage: authoring
    goals: Create or update architecture decision(s) that fulfill the REQ, with cross-references.
    tasks:
      - Identify architectural decisions needed (or update existing ones).
      - Create or update the entry in architecture-decisions.yaml with cross_references to REQ token(s), decision, rationale, alternatives_considered, traceability, related_decisions, metadata.
      - Create or update the ARCH detail file in architecture-decisions/ARCH-{TOKEN}.yaml per tied/detail-files-schema.md § ARCH.
      - Register each new ARCH token in semantic-tokens.yaml.
      - CALL SUB-YAML for each changed YAML file.
    outcomes: ARCH records exist with REQ cross-references; tokens registered; YAML validated.
  - id: S06.1
    title: Read and Catalog Contracts (Phase B — Reasoning)
    stage: impl
    goals: Catalog IMPL pseudo-code contracts for reasoning and validation.
    tasks:
      - 'Read each IMPL''s essence_pseudocode sequentially. For each, note: INPUT/OUTPUT/DATA (and CONTROL when present); procedure names (UPPER_SNAKE or camelCase); key branches (IF/ELSE), loops (FOR ... IN), error paths (ON error, RETURN error); async boundaries (AWAIT, Promise).'
    outcomes: Contracts cataloged; procedure names and structure noted.
  - id: S06.2
    title: Identify Insufficient Specs
    stage: impl
    goals: Flag incomplete specs that must be resolved before tests or code.
    tasks:
      - Flag missing INPUT or OUTPUT declarations.
      - Flag procedures referenced but not defined.
      - Flag branches without error handling on fallible paths.
      - Flag stub or template pseudo-code on IMPL with status Active.
      - Flag blocks with no token comment (violates [PROC-IMPL_PSEUDOCODE_TOKENS]).
    outcomes: All insufficient specs flagged; resolution required before proceeding.
  - id: S06.3
    title: Identify Contradictory Specs
    stage: impl
    goals: Compare across IMPLs for conflicts.
    tasks:
      - 'Compare across IMPLs: shared DATA conflict; ordering conflict; incompatible OUTPUT types; duplicate logic with different parameters or behavior.'
    outcomes: Contradictions identified.
  - id: S06.4
    title: Resolve and Update
    stage: impl
    goals: Resolve all issues from S06.2-S06.3; update pseudo-code; propagate scope changes to ARCH/REQ.
    tasks:
      - 'For each issue from S06.2-S06.3: update affected IMPL essence_pseudocode so contracts are compatible, ordering explicit, every block complete.'
      - IF resolution changes scope of an ARCH THEN GOTO S05 to update ARCH, then return here.
      - IF resolution changes scope of a REQ THEN GOTO S04 to update REQ, then return here.
    outcomes: All issues resolved; contracts compatible; ordering explicit.
  - id: S06.5
    title: Apply Block Token Comments (Phase C — Documentation)
    stage: impl
    goals: Apply [PROC-IMPL_PSEUDOCODE_TOKENS] to every IMPL; document cross-IMPL dependencies and composition.
    tasks:
      - 'Apply top-level comment: # [IMPL-X] [ARCH-Y] [REQ-Z] plus one-line summary.'
      - 'Sub-blocks (same token set): comment only the how.'
      - 'Sub-blocks (different token set): open with # [IMPL-...] [ARCH-...] [REQ-...] and how the sub-block implements them.'
      - 'Cross-IMPL dependency comments: when IMPL-A calls/depends on IMPL-B, calling block in IMPL-A names IMPL-B (and ARCH/REQ).'
      - 'Collision and composition notes: for each composed_with pair or code-path overlap document ordering, shared data, pre/post conditions.'
    outcomes: Every block has token comments; cross-IMPL dependencies and composition documented.
  - id: S06.5a
    title: Run Pseudo-Code Validation
    stage: impl
    goals: Ensure IMPL pseudo-code satisfies validation checklist before persisting or writing tests/code.
    tasks:
      - CALL SUB-PSEUDOCODE-VALIDATE. Run validation per [PROC-PSEUDOCODE_VALIDATION] using tied/docs/pseudocode-validation-checklist.yaml (or docs/ at repo root).
      - Run validation passes in recommended order; record findings with severity and source location.
      - Do not proceed to S06.6 until minimum gating rules are satisfied (or explicitly waived and documented).
      - 'If no parser/tool: perform manual pass over checklist categories and document results.'
    outcomes: Pseudo-code validation run; gating rules satisfied or waiver documented.
  - id: S06.6
    title: Persist IMPL Records
    stage: impl
    goals: Write IMPL index and detail files; register tokens; validate YAML.
    tasks:
      - Create or update implementation-decisions.yaml index entries with all required fields.
      - Create or update IMPL detail files in implementation-decisions/IMPL-{TOKEN}.yaml per tied/detail-files-schema.md § IMPL; include complete essence_pseudocode.
      - Register each new IMPL token in semantic-tokens.yaml.
      - CALL SUB-YAML for each changed YAML file.
    outcomes: All IMPL pseudo-code complete, authoritative, token-commented; no contradictions or gaps; all YAML validated.
  - id: S07
    title: Risk Analysis
    stage: risk_planning
    goals: Identify and document risks associated with the change.
    tasks:
      - List risks with severity and likelihood.
      - Where applicable, attach tied_token_references to each risk (which REQ/ARCH/IMPL the risk affects).
      - Document mitigation strategies.
    outcomes: Risks documented with token references. Mitigations identified.
  - id: S08
    title: Test Determination and Planning
    stage: risk_planning
    goals: Classify testability for each IMPL block; produce test matrix; plan TDD sequence.
    tasks:
      - For each IMPL block/procedure, classify as unit, integration, or e2e_only.
      - IF e2e_only THEN document e2e_only_reason naming the specific platform constraint in IMPL detail.
      - Build test matrix (Test name, IMPL block ref, REQ token, Token comments, Testability).
      - 'Plan TDD sequence: (1) Unit tests first, (2) Unit code via TDD, (3) Composition tests first, (4) Composition code via TDD, (5) E2E, (6) Validate and sync.'
      - Identify module boundaries and validation criteria per [REQ-MODULE_VALIDATION].
    outcomes: Test matrix complete; every IMPL block has testability classification; TDD sequence planned; module boundaries documented.
  - id: S09.RED
    title: Write Failing Test (Phase D)
    stage: unit_tdd
    goals: Map pseudo-code to a failing test.
    tasks:
      - Map the pseudo-code block/procedure to one test group (describe/it or test function). One block maps to approximately one test group.
      - Name the test group after the procedure and include the REQ token.
      - Carry the same REQ/ARCH/IMPL token comment as the pseudo-code block, stating what the test validates.
      - Write the failing test. Run the test suite. Confirm the test fails for the expected reason. No production code in this step.
      - Verify the assertion corresponds to the OUTPUT or effect in the pseudo-code block.
      - IF no programmatic assertion can be written THEN mark testability e2e_only in IMPL detail with e2e_only_reason; skip to next block.
    outcomes: Failing test exists that matches pseudo-code; no production code written.
  - id: S09.GREEN
    title: Write Minimum Production Code (Phase E)
    stage: unit_tdd
    goals: Write the minimum code to pass the failing test.
    tasks:
      - Write only enough production code to make the failing test pass.
      - Carry the same REQ/ARCH/IMPL token comment as the pseudo-code block, stating how the code implements.
      - Run tests. IF tests fail THEN iterate on production code only (do not add new tests in GREEN).
      - Run language-specific lint (Rust/TypeScript/Swift/YAML per project). IF lint fails THEN fix before proceeding.
    outcomes: Test passes; lint clean; code carries correct token comments.
  - id: S09.REFACTOR
    title: Refactor (optional)
    stage: unit_tdd
    goals: Improve code quality without changing behavior.
    tasks:
      - Clean up test or production code (extract functions, rename, simplify).
      - Re-run tests + lint. Confirm no regressions.
    outcomes: Code is cleaner; all tests still pass; lint still clean.
  - id: S09.SYNC
    title: Three-Way Alignment Check (Phase F)
    stage: unit_tdd
    goals: Verify pseudo-code, tests, and code carry identical token sets with corresponding descriptions.
    tasks:
      - For every block in this iteration, verify the three artifacts carry the same token set (pseudo-code block, test block, code block). IF any artifact names or omits a token differently, alignment is broken.
      - 'IF any diverge THEN update pseudo-code first, then test, then code (LEAP order: IMPL -> test -> code).'
      - 'Run [PROC-TOKEN_AUDIT]: every token named in any of the three must exist in semantic-tokens.yaml. IF missing THEN register and CALL SUB-YAML.'
    outcomes: Three-way alignment verified for the iteration. All tokens registered.
  - id: S10
    title: Composition Testing (Phase G)
    stage: composition
    goals: Test bindings between validated modules without invoking the UI. Every binding must have IMPL coverage and a composition test.
    tasks:
      - 'Identify bindings: event listeners, IPC channels, entry-point delegation, function wiring, platform hooks.'
      - 'For each binding: locate IMPL that describes composition. IF none and binding belongs to existing IMPL THEN extend IMPL pseudo-code, GOTO S06.5, CALL SUB-YAML, return here. IF none and distinct design THEN create new IMPL, GOTO S06 (from S06.1), return here.'
      - Write failing composition test for each binding (before composition code); carries IMPL token comments; verifies trigger -> unit called -> arguments -> effect; does not invoke UI.
      - Write composition code to pass the test. No composition code without preceding failing test.
      - Apply three-way alignment (same rules as S09.SYNC). Run tests + lint; fix any failures.
    outcomes: All bindings have composition tests; composition code passes; three-way alignment holds.
  - id: S11
    title: E2E Testing (Phase H)
    stage: e2e
    goals: Cover behavior that genuinely requires UI invocation. E2E does not substitute for composition tests.
    tasks:
      - 'Identify E2E-only behavior: native OS menus, visual rendering, platform behavior that cannot be simulated below E2E.'
      - Confirm IMPL detail has testability e2e_only, e2e_only_reason (named platform constraint), and E2E-only boundary comment in essence_pseudocode.
      - Write E2E test referencing REQ and IMPL tokens; comment justifies why composition-level testing is insufficient.
      - Ensure bindings testable below E2E have composition tests even if E2E also covers them.
    outcomes: E2E tests exist for all UI-only behavior; each justified with named platform constraint.
  - id: S12
    title: Final Validation (Phase I)
    stage: validation
    goals: Confirm everything is aligned, passing, and consistent. Compound gate before work is complete.
    tasks:
      - Run full test suite (unit, composition, E2E). All must pass.
      - Run lint for each language in scope.
      - 'Run [PROC-TOKEN_VALIDATION]: tied_validate_consistency (MCP); fix any issues.'
      - 'Final three-way alignment audit: for every IMPL touched, verify pseudo-code/test/code same token set; document e2e_only blocks and e2e_only_reason.'
      - 'Update IMPL detail metadata: traceability.tests, code_locations, metadata.last_updated. CALL SUB-YAML on each changed detail file.'
      - 'Module validation per [REQ-MODULE_VALIDATION]: confirm each module validated independently; document results.'
    outcomes: All tests pass; lint clean; token validation passes; three-way alignment verified; IMPL metadata current; module validation documented.
  - id: S13
    title: Sync TIED to Code and Tests
    stage: validation
    goals: Ensure TIED documentation matches the final implementation. TIED docs remain single source of truth for intent.
    tasks:
      - Update REQ/ARCH/IMPL index entries and detail files to match final code and tests; IMPLs reflect implemented code and block-level token comments.
      - Sync semantic-tokens.yaml, requirements.yaml, architecture-decisions.yaml, implementation-decisions.yaml and detail files; no documentation drift.
      - CALL SUB-YAML on every changed file.
      - Run tied_validate_consistency (MCP) — must report ok true.
    outcomes: TIED docs consistent with implementation; tied_validate_consistency passes.
  - id: S14
    title: Update README and CHANGELOG
    stage: closeout
    goals: Record user-facing and release-facing changes made in this session.
    tasks:
      - Update README.md for any user-facing changes (new features, changed behavior, setup instructions).
      - Update CHANGELOG.md for release-facing changes (features, fixes, breaking changes).
    outcomes: External documentation reflects the session's changes.
  - id: S15
    title: Persist CITDP Record
    stage: closeout
    goals: Store the change-analysis record for future reference.
    tasks:
      - 'Populate CITDP YAML record: record identity; change definition (from S02); impact analysis (from S03); risk analysis (from S07); test strategy (from S08); TDD sequence (from S09-S11); completion criteria (from S12); LEAP feedback (divergences_from_analysis, tied_stack_updates_required, record_status).'
      - Store as docs/citdp/CITDP-{change_request_id}.yaml (or project-defined location).
      - CALL SUB-YAML on the record file.
    outcomes: CITDP record stored and validated; analysis available for future reference.
  - id: S16
    title: Commit
    stage: closeout
    goals: Create a traceable commit with proper format and token references.
    tasks:
      - 'Write commit message per [PROC-COMMIT_MESSAGES]: header <type>(<scope>): <subject> (≤50 chars); type feat|fix|docs|refactor|test|build|ci|chore|perf|style; scope area affected; subject imperative present tense; body motivation/behavior; footer Closes/Fixes #issue and REQ/ARCH/IMPL tokens touched.'
      - Stage relevant files. Commit.
      - Do NOT push unless explicitly asked.
    outcomes: 'Commit exists with proper format; TIED tokens referenced in body or footer. EXIT: Checklist complete. Do not create a stand-alone summary document.'
references:
  - docs/agent-req-implementation-checklist.md
  - docs/agent-req-implementation-checklist.yaml
  - tied/processes.md
  - tied/docs/impl-code-test-linkage.md
  - tied/docs/implementation-order.md
