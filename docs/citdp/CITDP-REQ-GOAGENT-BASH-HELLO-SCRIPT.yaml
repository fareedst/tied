risk_analysis:
  summary: |
    Low scope; hazards include wrong working directory in tests, missing bash on PATH, wrong basename choice in mixed workspaces, and
    TIED YAML edited without validation when MCP is unavailable.
  risks:
    - id: RISK-BASH-001
      description: |
        Go test runs with cwd or Dir such that neither hello_world.sh nor hello.sh is found, or the wrong file is executed.
      severity: Medium
      likelihood: Low
      tied_token_references:
        - REQ-GOAGENT-BASH-HELLO-SCRIPT
        - IMPL-GOAGENT-BASH-HELLO-SCRIPT
      mitigation: |
        Resolve module root via runtime.Caller(0); set cmd.Dir to module root; tests for missing script; document in IMPL RESOLVE.
    - id: RISK-BASH-002
      description: |
        bash not on PATH or non-POSIX environment breaks go test despite valid script.
      severity: Low
      likelihood: Low
      tied_token_references:
        - REQ-GOAGENT-BASH-HELLO-SCRIPT
      mitigation: |
        Document dependency on bash for automated test; REQ targets normal dev/CI environments.
    - id: RISK-BASH-003
      description: |
        Direct IDE edits to tied/*.yaml without lint_yaml / tied_validate_consistency cause index/detail drift.
      severity: Medium
      likelihood: Medium
      tied_token_references:
        - REQ-TIED_SETUP
        - IMPL-TIED_FILES
        - IMPL-GOAGENT-BASH-HELLO-SCRIPT
      mitigation: |
        Prefer MCP writers when available; else document bypass; run validateConsistency and SUB-YAML after edits.
