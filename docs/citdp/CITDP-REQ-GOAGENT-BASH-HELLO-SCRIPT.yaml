risk_analysis:
  summary: |
    Low scope; main hazards are wrong working directory in tests, missing bash on PATH in exotic CI images, and TIED YAML edited
    without validation when MCP is unavailable.
  risks:
    - id: RISK-BASH-001
      description: |
        Go test runs with cwd other than repo root so hello_world.sh is not found or a different file is executed.
      severity: Medium
      likelihood: Low
      tied_token_references:
        - REQ-GOAGENT-BASH-HELLO-SCRIPT
        - IMPL-GOAGENT-BASH-HELLO-SCRIPT
      mitigation: |
        Set cmd.Dir to directory of test file via runtime.Caller(0); assert in test; document in IMPL UNIT_TEST_SCRIPT_ENTRY.
    - id: RISK-BASH-002
      description: |
        bash not on PATH or non-POSIX environment breaks go test despite valid script.
      severity: Low
      likelihood: Low
      tied_token_references:
        - REQ-GOAGENT-BASH-HELLO-SCRIPT
      mitigation: |
        Document dependency on bash for test; REQ targets normal dev/CI Unix-like environments.
    - id: RISK-BASH-003
      description: |
        Direct IDE edits to tied/*.yaml without lint_yaml / tied_validate_consistency cause index/detail drift.
      severity: Medium
      likelihood: Medium
      tied_token_references:
        - REQ-TIED_SETUP
        - IMPL-TIED_FILES
        - IMPL-GOAGENT-BASH-HELLO-SCRIPT
      mitigation: |
        Prefer MCP writers when available; else TIED_YAML_BYPASS with explicit note; run validateConsistency and SUB-YAML after edits.
