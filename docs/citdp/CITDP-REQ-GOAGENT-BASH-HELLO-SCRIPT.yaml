change_definition:
  summary: |
    Provide a minimal Bash script at the repository root (hello_world.sh preferred, hello.sh allowed with identical body) that prints
    exactly one line "Hello World!" with a trailing newline, uses strict shell options, and exits zero; document and enforce via TIED
    REQ/ARCH/IMPL; verify with a small Go module that resolves the basename, runs bash with correct working directory, asserts OUTPUT
    contract, and exposes RunScriptEntrySmokeFromRoot for harness composition.
  current_behavior_prior: |
    No standard root-level Bash smoke artifact or TIED tokens for a trivial shell execution check alongside agentstream tooling.
  desired_behavior: |
    hello_world.sh (and/or hello.sh per resolution order) at repo root; go.mod + Go sources + hello_world_script_entry_test.go;
    go test ./... from root passes; TIED stack and tied_validate_consistency / validateConsistency ok after sync; README/CHANGELOG
    describe behavior, alternate basename, and helpers.
  non_goals:
    - Integration with tools/agentstream Go packages or Ruby agent-stream
    - Feature-rich CLI or configuration for the smoke script
  success_criteria:
    - bash on the resolved script prints "Hello World!\n" and exits 0
    - go test ./... from repo root passes (all five REQ-tagged tests)
    - tied_validate_consistency (or equivalent validateConsistency) ok for project tied/
    - README and CHANGELOG mention smoke paths, tokens, and test dimensions
    - CITDP record stored under docs/citdp and YAML-valid (SUB-YAML)
  references:
    - hello_world.sh
    - hello_world_script_entry_test.go
    - script_resolve.go
    - script_entry_contract.go
    - script_bash_stdout.go
    - script_smoke_compose.go
    - go.mod
    - tied/requirements/REQ-GOAGENT-BASH-HELLO-SCRIPT.yaml
