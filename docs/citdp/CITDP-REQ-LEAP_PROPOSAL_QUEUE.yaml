      - test_name: composition LEAP proposal MCP bindings
        impl_block_ref: MCP_HANDLER
        req_token: REQ-LEAP_PROPOSAL_QUEUE
        token_comments: '[REQ-LEAP_PROPOSAL_QUEUE] — leap-proposal-mcp.test.ts'
        testability: integration
        status: implemented
      - test_name: extractDiffProposalCandidates returns error without throw (non-repo)
        impl_block_ref: EXTRACT_DIFF_PROPOSAL_CANDIDATES
        req_token: REQ-LEAP_PROPOSAL_QUEUE
        token_comments: '[REQ-LEAP_PROPOSAL_QUEUE] [IMPL-MCP_LEAP_PROPOSAL_QUEUE] — outer catch; structured error'
        testability: integration
        status: planned
  tdd_sequence:
    ordered_steps:
      - id: 1
        name: Unit tests first
        scope: leap-proposal-queue.ts procedures classified unit/integration above
        notes: Strict TDD for new or gap rows; existing implemented rows already green.
      - id: 2
        name: Unit code via TDD
        scope: Production code in leap-proposal-queue.ts only changes to satisfy failing tests.
      - id: 3
        name: Composition tests first
        scope: MCP handlers in tools/index.ts (explicit_opt_in, safeLeapCall, delegation)
        notes: Add failing contract/integration tests before expanding handler logic.
      - id: 4
