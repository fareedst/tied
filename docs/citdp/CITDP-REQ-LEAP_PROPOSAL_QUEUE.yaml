      notes: leap-proposal-mcp.test.ts exercises handlers without MCP transport.
  test_matrix:
    rows:
      - test_name: 'queue: reject does not mutate yaml outside queue'
        impl_block_ref: REJECT_PROPOSAL
        req_token: REQ-LEAP_PROPOSAL_QUEUE
        token_comments: '[REQ-LEAP_PROPOSAL_QUEUE] — rejects pending; audit reject; no tied/*.yaml writes'
        testability: unit
        status: implemented
      - test_name: 'queue: approve then mark_applied'
        impl_block_ref: APPROVE_PROPOSAL; MARK_APPLIED
        req_token: REQ-LEAP_PROPOSAL_QUEUE
        token_comments: '[REQ-LEAP_PROPOSAL_QUEUE] — status transitions pending → approved → applied'
        testability: unit
        status: implemented
      - test_name: 'queue: edit pending only'
