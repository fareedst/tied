change_definition:
  summary: |
    Add an optional, non-canonical queue for inferred LEAP documentation hints (git diff lines, session
    export segments) with explicit human/agent review before any project TIED YAML changes. MCP tools
    persist data only under {projectRoot}/leap-proposals/; canonical REQ/ARCH/IMPL updates remain via
    existing yaml_index_* / detail tools after approval.
  current_behavior_prior: |
    No structured staging for machine-suggested LEAP content; feedback tools cover user-authored feedback
    only (IMPL-MCP_FEEDBACK_TOOLS). No Plumb-style extract→review→approve path in-repo without LLM.
  desired_behavior: |
    Stable proposal ids, JSON queue + JSONL audit, deterministic diff/session helpers, tied_leap_proposal_*
    MCP tools with safeLeapCall JSON envelope; explicit_opt_in for extract/import; no writes to project
    tied/*.yaml from queue lifecycle.
  non_goals:
    - Automatic promotion of proposals to canonical TIED without explicit MCP yaml steps
    - Full Plumb code rewrite parity
  success_criteria:
    - Unit and composition tests pass; README/CHANGELOG updated
    - tied_validate_consistency ok after TIED sync (detail-loader multi-doc; Ruby index alignment)
  references:
    - docs/leap-proposal-queue.md
    - tied/requirements/REQ-LEAP_PROPOSAL_QUEUE.yaml
impact_analysis:
  modules_affected:
    - path: mcp-server/src/analysis/leap-proposal-queue.ts
      role: Queue, audit, parseSessionExportSegments, extractDiffProposalCandidates, proposalsFromSessionSegments
    - path: mcp-server/src/tools/index.ts
      role: tied_leap_proposal_* handlers; safeLeapCall
    - path: mcp-server/src/detail-loader.ts
      role: loadDetail uses yaml.loadAll for methodology multi-document YAML (enables full-repo consistency)
    - path: mcp-server/scripts/remove-client-reqs-from-tied.mjs
      role: Optional strip of client-only REQ/ARCH/IMPL from project tied/ (inverse of mistaken merge)
  tied_tokens_new:
    - REQ-LEAP_PROPOSAL_QUEUE
    - ARCH-LEAP_PROPOSAL_QUEUE
    - IMPL-MCP_LEAP_PROPOSAL_QUEUE
  tied_tokens_affected: []
  module_boundaries: |
    LPQ-CORE (leap-proposal-queue.ts) validated before LPQ-MCP (handlers); see test_determination_and_planning.module_boundaries.
risk_analysis:
  summary: |
    Risks center on mistaking non-canonical proposals for TIED truth, unbounded on-disk
    artifacts, git/session extraction edge cases, and operational confusion when MCP cwd
    differs from the intended project root. Design explicitly avoids writing project TIED YAML
    from queue tools, which mitigates the highest-severity class of accidental canonical corruption.
  risks:
    - id: RISK-001
      description: |
        Users or agents treat proposal text as authoritative REQ/ARCH/IMPL without applying
        LEAP through yaml_index_* / detail writers and validation, causing drift or wrong edits.
      severity: High
      likelihood: Medium
      tied_token_references:
        - REQ-LEAP_PROPOSAL_QUEUE
        - ARCH-LEAP_PROPOSAL_QUEUE
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Document that proposals live under leap-proposals/ only; require explicit MCP YAML edits,
        lint_yaml, and tied_validate_consistency before marking applied. tied_leap_proposal_approve
        does not write tied/*.yaml. Workflow in docs/leap-proposal-queue.md lists apply-then-mark_applied.
    - id: RISK-002
      description: |
        queue.json or audit-log.jsonl grows without bound or is corrupted (partial write, disk full),
        breaking list/approve flows or losing audit history.
      severity: Medium
      likelihood: Low
      tied_token_references:
        - REQ-LEAP_PROPOSAL_QUEUE
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Operational: rotate or archive leap-proposals/ periodically in large repos; rely on JSON
        parse errors surfacing as tool errors. Future hardening could add size caps or rotation (out of scope).
    - id: RISK-003
      description: |
        Concurrent MCP clients or processes write queue.json simultaneously, leading to lost updates
        or inconsistent queue state.
      severity: Medium
      likelihood: Low
      tied_token_references:
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Single-writer expectation for the MCP server process; avoid parallel proposal writers against
        the same project root. Document serial use for automation.
    - id: RISK-004
      description: |
        extractDiffProposalCandidates fails or returns { error } (git unavailable, not a repo, diff errors);
        users assume proposals were created when none were.
      severity: Medium
      likelihood: Medium
      tied_token_references:
        - REQ-LEAP_PROPOSAL_QUEUE
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Tool returns structured result with error field; callers must check ok/error. Unit tests cover
        failure paths; IMPL pseudo-code documents non-throwing error return.
    - id: RISK-005
      description: |
        Session import or diff extraction produces low-quality or misleading line-level hints that
        pollute the queue and waste review time.
      severity: Low
      likelihood: Medium
      tied_token_references:
        - REQ-LEAP_PROPOSAL_QUEUE
        - ARCH-LEAP_PROPOSAL_QUEUE
      mitigation: |
        Reject workflow and manual update; explicit_opt_in required for extract/import; no auto-approval.
    - id: RISK-006
      description: |
        Project root resolves to an unexpected cwd (MCP server cwd), so leap-proposals/ is written
        beside the wrong tree or proposals are read from the wrong repo.
      severity: Medium
      likelihood: Medium
      tied_token_references:
        - ARCH-LEAP_PROPOSAL_QUEUE
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Document that paths are relative to configured project root / cwd; integrators pass explicit
        projectRoot where supported. Verify leap-proposals/ location before bulk operations.
    - id: RISK-007
      description: |
        safeLeapCall / JSON error envelope swallows sync fs or git exceptions into { ok: false, error },
        making root causes harder to see in logs than a thrown stack.
      severity: Low
      likelihood: Medium
      tied_token_references:
        - IMPL-MCP_LEAP_PROPOSAL_QUEUE
      mitigation: |
        Error strings propagate to clients; DEBUG/TRACE logging can be added at call sites if needed.
        Acceptable tradeoff for MCP JSON contract stability.
    - id: RISK-008
      description: |
        Users skip tied_leap_proposal_mark_applied after editing TIED YAML, leaving proposals "approved"
        but not linked to completed LEAP work, confusing queue hygiene.
      severity: Low
      likelihood: Medium
      tied_token_references:
        - REQ-LEAP_PROPOSAL_QUEUE
      mitigation: |
        Document final step in docs/leap-proposal-queue.md; list view shows status; periodic manual cleanup.
test_determination_and_planning:
  reference_impl: IMPL-MCP_LEAP_PROPOSAL_QUEUE
  essence_pseudocode_source: tied/implementation-decisions/IMPL-MCP_LEAP_PROPOSAL_QUEUE.yaml
  e2e_only_blocks: []
  e2e_only_note: |
    No IMPL block requires UI or MCP transport for intrinsic correctness; behavior is unit- or
    integration-testable in Node. Optional future MCP contract tests may call tool handlers with
    fixture projectRoot; that remains integration, not platform e2e.
  impl_block_testability:
