        req_token: REQ-LEAP_PROPOSAL_QUEUE
        token_comments: '[REQ-LEAP_PROPOSAL_QUEUE] — update allowed only while pending'
        testability: unit
        status: implemented
      - test_name: PROPOSALS_FROM_SESSION_SEGMENTS REQ-LEAP_PROPOSAL_QUEUE — trims segment text in summary output
        impl_block_ref: PROPOSALS_FROM_SESSION_SEGMENTS
        req_token: REQ-LEAP_PROPOSAL_QUEUE
        token_comments: '[REQ-LEAP_PROPOSAL_QUEUE] [ARCH-LEAP_PROPOSAL_QUEUE] [IMPL-MCP_LEAP_PROPOSAL_QUEUE] — trim'
        testability: unit
        status: implemented
      - test_name: 'session export: split by --- and JSON array'
        impl_block_ref: PARSE_SESSION_EXPORT_SEGMENTS
        req_token: REQ-LEAP_PROPOSAL_QUEUE
        token_comments: '[REQ-LEAP_PROPOSAL_QUEUE] — deterministic segment parsing'
        testability: unit
        status: implemented
      - test_name: queue file schema
        impl_block_ref: ADD_PROPOSAL; SAVE_QUEUE; APPEND_AUDIT
        req_token: REQ-LEAP_PROPOSAL_QUEUE
        token_comments: '[REQ-LEAP_PROPOSAL_QUEUE] — leap-proposal-queue.v1 and audit schema lines'
        testability: unit
